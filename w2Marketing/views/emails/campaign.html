<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <!--[if !mso]><!-->
  <style>@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap');</style>
  <!--<![endif]-->
  <style>
    body { margin:0; padding:0; background:#F5F3EF; font-family:'Jost',Helvetica,Arial,sans-serif; }
    .preheader { display:none !important; max-height:0; overflow:hidden; mso-hide:all; }
  </style>
</head>
<body style="margin:0;padding:0;background:#F5F3EF;">
  <span class="preheader" style="display:none!important;max-height:0;overflow:hidden;mso-hide:all;">{preheader}</span>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F5F3EF;">
    <tr><td align="center" style="padding:32px 16px;">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
        <!-- Header -->
        <tr>
          <td style="background:#1C2B4A;padding:28px 32px;text-align:center;">
            <div style="font-family:Georgia,'Cormorant Garamond',serif;font-size:22px;color:#FDFCFA;font-weight:normal;letter-spacing:0.02em;">W2 Marketing</div>
          </td>
        </tr>
        <tr><td style="height:3px;background:#C9A848;font-size:0;line-height:0;">&nbsp;</td></tr>
        <!-- Body -->
        <tr>
          <td style="background:#FDFCFA;padding:36px 32px;">
            <div style="font-family:'Jost',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.7;color:#0F1B30;">
{body}
            </div>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background:#F5F3EF;padding:24px 32px;text-align:center;">
            <div style="font-family:'Jost',Helvetica,Arial,sans-serif;font-size:12px;color:#6B7380;line-height:1.6;">
              W2 Marketing &middot; Greeley, CO<br>
              <a href="{unsubscribeUrl}" style="color:#6B7380;text-decoration:underline;">Unsubscribe</a>
            </div>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
