<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{brandName}</title>
  <!--[if !mso]><!-->
  <style>@import url('https://fonts.googleapis.com/css2?family={font_heading_url}&family={font_body_url}:wght@300;400;500;600;700&display=swap');</style>
  <!--<![endif]-->
  <style>
    body, table, td, p, a { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    table, td { mso-table-lspace:0; mso-table-rspace:0; border-collapse:collapse; }
    img { -ms-interpolation-mode:bicubic; border:0; display:block; }
    .preheader { display:none!important; max-height:0; overflow:hidden; mso-hide:all; visibility:hidden; opacity:0; color:transparent; }
    @media only screen and (max-width:620px) {
      .wrap { width:100%!important; }
      .pad-x { padding-left:20px!important; padding-right:20px!important; }
      .h-title { font-size:24px!important; }
      .body-text { font-size:15px!important; }
    }
    @media (prefers-color-scheme: dark) {
      .body-bg { background:#0B0E14!important; }
      .surface { background:#151A24!important; }
      .footer-bg { background:#0B0E14!important; }
      .text-primary { color:#E8ECF2!important; }
      .text-muted { color:#9AA3B2!important; }
      .border-soft { border-color:#2A3140!important; }
    }
  </style>
</head>
<body class="body-bg" style="margin:0;padding:0;background:{c_bg};font-family:'{font_body}',Helvetica,Arial,sans-serif;">
  <span class="preheader">{preheader}</span>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="body-bg" style="background:{c_bg};">
    <tr><td align="center" style="padding:32px 16px;">
      <table role="presentation" class="wrap" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

        <!-- Header -->
        <tr><td class="surface" style="background:{c_primary};padding:32px 36px;text-align:center;border-radius:6px 6px 0 0;">
          <div style="font-family:'{font_heading}',Georgia,serif;font-size:24px;color:{on_primary};font-weight:500;letter-spacing:0.6px;line-height:1.1;">{brandName}</div>
          <div style="font-family:'{font_body}',Helvetica,Arial,sans-serif;font-size:10px;color:{accent_on_primary};letter-spacing:2.8px;text-transform:uppercase;margin-top:6px;">{brandLocation}</div>
        </td></tr>

        <!-- Gold accent line -->
        <tr><td style="background:{c_accent};height:3px;font-size:0;line-height:0;">&nbsp;</td></tr>

        <!-- Body -->
        <tr><td class="surface pad-x" style="background:{c_white};padding:40px 36px;">
          <div class="text-primary body-text" style="font-family:'{font_body}',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.75;color:{c_primary_deep};">
{body}
          </div>
        </td></tr>

        <!-- Signature row -->
        <tr><td class="surface pad-x" style="background:{c_white};padding:0 36px 32px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <tr><td class="border-soft" style="border-top:1px solid {c_border};padding-top:20px;">
              <div style="font-family:'{font_heading}',Georgia,serif;font-size:15px;color:{c_primary};font-weight:500;letter-spacing:0.3px;">— The {brandName} team</div>
              <div class="text-muted" style="font-family:'{font_body}',Helvetica,Arial,sans-serif;font-size:12px;color:{c_text_muted};margin-top:4px;">{brandLocation}</div>
            </td></tr>
          </table>
        </td></tr>

        <!-- Footer -->
        <tr><td class="footer-bg" style="background:{c_bg};padding:24px 36px 32px;text-align:center;border-radius:0 0 6px 6px;">
          <div style="font-family:'{font_body}',Helvetica,Arial,sans-serif;font-size:11px;color:{c_text_muted};line-height:1.7;">
            {brandName} &middot; {brandLocation}<br>
            &copy; {year} {brandName} &middot; <a href="{unsubscribeUrl}" style="color:{c_text_muted};text-decoration:underline;">Unsubscribe</a>
          </div>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
