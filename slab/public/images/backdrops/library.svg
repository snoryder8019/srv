<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="books" width="86" height="180" patternUnits="userSpaceOnUse">
      <rect width="86" height="180" fill="#241712"/>
      <rect width="20" height="180" x="2"  fill="#5b3a25"/>
      <rect width="24" height="180" x="24" fill="#7a4530"/>
      <rect width="18" height="180" x="50" fill="#3e2a1a"/>
      <rect width="14" height="180" x="70" fill="#94613a"/>
    </pattern>
    <linearGradient id="dim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="warm" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f8c878" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f8c878" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#books)"/>
  <!-- shelf dividers -->
  <g fill="#1b110a">
    <rect x="0" y="178" width="1280" height="8"/>
    <rect x="0" y="358" width="1280" height="8"/>
    <rect x="0" y="538" width="1280" height="8"/>
  </g>
  <rect width="1280" height="720" fill="url(#dim)"/>
  <rect width="1280" height="720" fill="url(#warm)"/>
</svg>
