<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1b3a5a"/>
      <stop offset="40%" stop-color="#b85a4e"/>
      <stop offset="70%" stop-color="#e6905a"/>
      <stop offset="100%" stop-color="#f4c97e"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c0"/>
      <stop offset="60%" stop-color="#fbd17e"/>
      <stop offset="100%" stop-color="#fbd17e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2538"/>
      <stop offset="100%" stop-color="#284a6c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="500" fill="url(#sky)"/>
  <circle cx="640" cy="470" r="160" fill="url(#sun)"/>
  <rect y="500" width="1280" height="220" fill="url(#sea)"/>
  <!-- subtle reflection -->
  <g opacity="0.55" fill="#fbd17e">
    <rect x="540" y="510" width="200" height="3"/>
    <rect x="560" y="525" width="160" height="2"/>
    <rect x="580" y="540" width="120" height="2"/>
    <rect x="600" y="555" width="80"  height="2"/>
  </g>
</svg>
