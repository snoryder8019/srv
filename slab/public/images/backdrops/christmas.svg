<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a1933"/>
      <stop offset="60%"  stop-color="#13264a"/>
      <stop offset="100%" stop-color="#1a2c52"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="85%" r="65%">
      <stop offset="0%"   stop-color="#fff2c0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff2c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokehGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fed98a" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#f7b955" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f7b955" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokehRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffb39c" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#e25c4a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e25c4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokehGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#86d39c" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#3aaf65" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3aaf65" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <!-- Snowflakes -->
  <g fill="#ffffff">
    <circle cx="80"   cy="60"  r="3" opacity="0.9"/>
    <circle cx="220"  cy="120" r="2" opacity="0.7"/>
    <circle cx="360"  cy="40"  r="3" opacity="0.85"/>
    <circle cx="500"  cy="160" r="2" opacity="0.65"/>
    <circle cx="660"  cy="80"  r="3" opacity="0.9"/>
    <circle cx="820"  cy="140" r="2" opacity="0.7"/>
    <circle cx="970"  cy="50"  r="3" opacity="0.85"/>
    <circle cx="1120" cy="170" r="2" opacity="0.75"/>
    <circle cx="150"  cy="240" r="2" opacity="0.65"/>
    <circle cx="320"  cy="300" r="3" opacity="0.85"/>
    <circle cx="580"  cy="260" r="2" opacity="0.65"/>
    <circle cx="740"  cy="320" r="3" opacity="0.8"/>
    <circle cx="940"  cy="280" r="2" opacity="0.7"/>
    <circle cx="1180" cy="320" r="3" opacity="0.85"/>
    <circle cx="110"  cy="420" r="2" opacity="0.6"/>
    <circle cx="270"  cy="480" r="3" opacity="0.85"/>
    <circle cx="450"  cy="430" r="2" opacity="0.6"/>
    <circle cx="610"  cy="500" r="2" opacity="0.6"/>
    <circle cx="790"  cy="470" r="3" opacity="0.8"/>
    <circle cx="1010" cy="510" r="2" opacity="0.65"/>
    <circle cx="1200" cy="460" r="3" opacity="0.85"/>
  </g>

  <!-- Evergreen tree silhouettes -->
  <g fill="#0a2410">
    <polygon points="60,720  170,420  280,720"/>
    <polygon points="140,720 195,520  250,720"/>
    <polygon points="900,720 1010,380 1120,720"/>
    <polygon points="980,720 1050,520 1120,720"/>
    <polygon points="600,720 700,540  800,720"/>
  </g>
  <!-- Tree highlights (slight rim of light) -->
  <g fill="#1d4a2c" opacity="0.45">
    <polygon points="170,420 200,460 220,500 180,460"/>
    <polygon points="1010,380 1050,440 1080,500 1030,440"/>
    <polygon points="700,540 730,575 750,610 715,575"/>
  </g>

  <!-- Warm bokeh string lights -->
  <g>
    <circle cx="180"  cy="450" r="44" fill="url(#bokehGold)"/>
    <circle cx="180"  cy="450" r="9"  fill="#fff2c0"/>
    <circle cx="430"  cy="370" r="40" fill="url(#bokehRed)"/>
    <circle cx="430"  cy="370" r="9"  fill="#ffd8c8"/>
    <circle cx="660"  cy="430" r="46" fill="url(#bokehGold)"/>
    <circle cx="660"  cy="430" r="10" fill="#fff2c0"/>
    <circle cx="880"  cy="360" r="40" fill="url(#bokehGreen)"/>
    <circle cx="880"  cy="360" r="9"  fill="#d8f1e2"/>
    <circle cx="1100" cy="430" r="44" fill="url(#bokehRed)"/>
    <circle cx="1100" cy="430" r="9"  fill="#ffd8c8"/>
    <!-- distant smaller lights -->
    <circle cx="320"  cy="220" r="22" fill="url(#bokehGold)"/>
    <circle cx="780"  cy="200" r="22" fill="url(#bokehRed)"/>
    <circle cx="1020" cy="240" r="22" fill="url(#bokehGold)"/>
  </g>
</svg>
