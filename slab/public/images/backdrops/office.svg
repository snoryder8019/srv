<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2e25"/>
      <stop offset="100%" stop-color="#1b1612"/>
    </linearGradient>
    <radialGradient id="lite" cx="78%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#ffd28a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd28a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f16"/>
      <stop offset="100%" stop-color="#13100c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#wall)"/>
  <rect width="1280" height="720" fill="url(#lite)"/>
  <!-- Window frame on right -->
  <g opacity="0.35" fill="none" stroke="#ffe0a8" stroke-width="2">
    <rect x="860" y="80" width="280" height="320" rx="4"/>
    <line x1="1000" y1="80" x2="1000" y2="400"/>
    <line x1="860" y1="240" x2="1140" y2="240"/>
  </g>
  <rect x="0" y="540" width="1280" height="180" fill="url(#desk)"/>
  <ellipse cx="640" cy="540" rx="900" ry="14" fill="#000" opacity="0.4"/>
</svg>
