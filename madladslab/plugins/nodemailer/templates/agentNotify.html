<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Notification</title>
</head>
<body style="margin:0;padding:0;background:#0d1117;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d1117;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#161b22;border-radius:12px;border:1px solid #30363d;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#238636 0%,#1f6feb 100%);padding:24px 32px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <h1 style="margin:0;color:#fff;font-size:20px;font-weight:600;">🤖 Agent Notification</h1>
                    <p style="margin:4px 0 0;color:rgba(255,255,255,0.8);font-size:13px;">from {agentName}</p>
                  </td>
                  <td align="right" style="color:rgba(255,255,255,0.6);font-size:12px;">
                    Mad Lads Lab
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Subject Line -->
          <tr>
            <td style="padding:24px 32px 0;">
              <h2 style="margin:0;color:#e6edf3;font-size:18px;font-weight:600;">{subject}</h2>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:16px 32px 24px;">
              <div style="color:#c9d1d9;font-size:14px;line-height:1.6;">
                {body}
              </div>
            </td>
          </tr>
          <!-- Priority Badge -->
          <tr>
            <td style="padding:0 32px 24px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:{priorityColor};border-radius:12px;padding:4px 12px;">
                    <span style="color:#fff;font-size:11px;font-weight:600;text-transform:uppercase;">{priority} priority</span>
                  </td>
                  <td style="padding-left:12px;color:#8b949e;font-size:12px;">
                    Agent ID: {agentId}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px;border-top:1px solid #30363d;">
              <p style="margin:0;color:#8b949e;font-size:11px;">
                This message was sent automatically by an AI agent on Mad Lads Lab.
                <br>Manage agent permissions at <a href="https://madladslab.com/agents" style="color:#58a6ff;text-decoration:none;">madladslab.com/agents</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
