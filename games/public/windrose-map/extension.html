<div class="wrme-wrap">
  <canvas id="wrme_canvas" class="wrme-canvas"></canvas>
  <div class="wrme-zoom">
    <button class="wrme-zbtn" id="wrme_zin">+</button>
    <button class="wrme-zbtn" id="wrme_zout">&#8722;</button>
  </div>
  <div class="wrme-panel" id="wrme_panel">
    <div class="wrme-hdr" id="wrme_hdr">&#9875; Sea Chart <span id="wrme_arrow">&#9660;</span></div>
    <div class="wrme-body" id="wrme_body">
      <div id="wrme_stats" class="wrme-stats">Loading&hellip;</div>
      <div class="wrme-toggles">
        <label class="wrme-tog"><input type="checkbox" id="wrme_tog_mobs" checked> Creatures</label>
        <label class="wrme-tog"><input type="checkbox" id="wrme_tog_pois" checked> POIs</label>
      </div>
      <div class="wrme-hint">Scroll &bull; Pinch to zoom &bull; Drag to pan &bull; Tap player</div>
    </div>
  </div>
</div>
