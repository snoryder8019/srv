<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MadLadsLab Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-top: 3px solid #cd412b;
      border-radius: 4px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 { color: #cd412b; font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: #555; font-size: 0.8rem; margin-bottom: 32px; }
    label { display: block; color: #888; font-size: 0.75rem; margin-bottom: 6px; letter-spacing: 0.05em; }
    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 14px;
      border-radius: 3px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #cd412b; }
    button {
      width: 100%;
      background: #cd412b;
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 12px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    button:hover { background: #b83525; }
    .error {
      background: #2a1010;
      border: 1px solid #cd412b;
      color: #ff6b6b;
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 3px;
      margin-bottom: 20px;
    }
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: #333; font-size: 0.75rem; margin: 20px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2a2a2a; }
    .btn-google {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 11px;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .btn-google:hover { border-color: #555; }
    .note {
      color: #444;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 24px;
    }
    .note a { color: #cd412b; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MadLadsLab</h1>
    <p class="sub">Game Server Portal</p>
    <div id="err" class="error" style="display:none">Invalid email or password.</div>
    <form method="POST" action="/login">
      <label>EMAIL</label>
      <input type="email" name="email" required autocomplete="email" autofocus>
      <label>PASSWORD</label>
      <input type="password" name="password" required autocomplete="current-password">
      <button type="submit">LOGIN</button>
    </form>
    <div class="divider">OR</div>
    <a class="btn-google" href="/auth/google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </a>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
