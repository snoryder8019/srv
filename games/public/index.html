// Collapses runs of repeated low-signal events (e.g. raid_end) into a
// single row carrying a _count and the most recent ts. Keeps the feed
// readable when Valheim's MadLadsEventLogger fires multiple raid_end
// notices for stacked random events.
function consolidateFeedEvents(events) {
  const COLLAPSIBLE = new Set(['raid_end']);
  const out = [];
  for (const ev of events) {
    const last = out[out.length - 1];
    if (last && COLLAPSIBLE.has(ev.type) && last.type === ev.type && last.game === ev.game) {
      last._count = (last._count || 1) + 1;
      last.ts = ev.ts;
    } else {
      out.push({ ...ev });
    }
  }
  return out;
}

function renderFeed(opts = {}) {
  const list = document.getElementById('eventList');
  if (!feedEvents.length) {
    list.innerHTML = '<div class="event-item"><span class="event-text" style="color:var(--muted);font-style:italic;">No events yet</span></div>';
    document.getElementById('feedCount').textContent = '0 events';
    return;
  }
  const grouped = consolidateFeedEvents(feedEvents);
  const loaderRow = feedHasMore
    ? '<button class="event-load-older" id="feedLoadOlder" onclick="loadOlderEvents()"' +
      (feedLoadingOlder ? ' disabled>Loading older events…' : '>Load older events') + '</button>'
    : '';
  list.innerHTML = loaderRow + grouped.map(renderEventItem).join('');
  if (opts.preserveScroll) {
    // Keep the user anchored on the row they were reading after a prepend.
    list.scrollTop = (list.scrollHeight - opts.prevHeight) + opts.prevTop;
  } else {
    list.scrollTop = list.scrollHeight;
  }
  document.getElementById('feedCount').textContent = feedEvents.length + ' events';
}

function renderEventItem(ev) {
  const time = new Date(ev.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const icon = EVENT_ICONS[ev.type] || '\u{2022}';
  const gameClass = GAME_CSS[ev.game] || 'rust';
  const gameName = GAME_NAMES[ev.game] || esc(ev.game);
  let text = '';

  switch (ev.type) {
    case 'player_join':
      text = '<span class="name">' + esc(ev.name || 'Anonymous') + '</span> joined'; break;
    case 'player_leave':
      text = '<span class="name">' + esc(ev.name || 'Anonymous') + '</span> left'; break;
    case 'character_name':
      text = '<span class="name">' + esc(ev.name || '?') + '</span> entered the world'; break;
    case 'chat':
      text = '<span class="name">' + esc(ev.name || 'Player') + '</span>: ' + esc(ev.message || ''); break;
    case 'kill':
      text = '<span class="name">' + esc(ev.attacker || '?') + '</span> killed <span class="name">' + esc(ev.victim || '?') + '</span>'; break;
    case 'death':
      text = '<span class="name">' + esc(ev.victim || '?') + '</span> killed by <span class="name">' + esc(ev.attacker || '?') + '</span>'; break;
    case 'boss_kill':
      // Valheim emits killedBy + boss names; Windrose's K2_DestroyActor route
      // only knows the actor class, so fall back to the cleaned class name.
      text = ev.killedBy
        ? '<span class="name">' + esc(ev.killedBy) + '</span> slew boss <span class="name">' + esc(ev.boss || prettyActorClass(ev.actorClass)) + '</span>'
        : 'Boss defeated · <span class="name">' + esc(prettyActorClass(ev.boss || ev.actorClass)) + '</span>'; break;
    case 'mob_kill':
      text = 'Mob killed · ' + esc(prettyActorClass(ev.victim || ev.actorClass)); break;
    case 'npc_kill':
      text = 'NPC killed · ' + esc(prettyActorClass(ev.victim || ev.actorClass)); break;
    case 'ship_sunk':
      text = 'Ship sunk · <span class="name">' + esc(prettyActorClass(ev.victim || ev.actorClass)) + '</span>'; break;
    case 'item_drop':
      text = 'Item dropped · ' + esc(prettyActorClass(ev.item || ev.actorClass)); break;
    case 'raid_start':
      text = 'Raid started: <span class="name">' + esc(ev.raidEvent || '?') + '</span>'; break;
    case 'raid_end':
      text = 'Raid ended' + (ev._count > 1 ? ' <span class="event-count">×' + ev._count + '</span>' : ''); break;
    case 'piece_place':
      text = '<span class="name">' + esc(ev.name || '?') + '</span> built <span class="name">' + esc(ev.piece || '?') + '</span>'; break;
    case 'map_change':
      text = 'Map changed to <span class="name">' + esc(ev.map || '?') + '</span>'; break;
    case 'server_start':
      text = 'Server started'; break;
    case 'server_ready':
      text = 'Server ready to connect'; break;
    default:
      text = esc(ev.type);
  }

  return '<div class="event-item">' +
    '<span class="event-time">' + time + '</span>' +
    '<span class="event-game ' + gameClass + '">' + gameName + '</span>' +
    '<span class="event-icon">' + icon + '</span>' +
    '<span class="event-text">' + text + '</span>' +
    '</div>';
}


function connectServerState() {
  const sock = io('/stats', { transports: ['websocket', 'polling'] });
  sock.on('connect', () => sock.emit('stats:subscribe', null));
  sock.on('stats:snapshot', (d) => { if (d && d.game) applyServerState(d.game, d); });
  sock.on('server:status',  (d) => { if (d && d.game) applyServerState(d.game, d); });
  sock.on('server:starting', ({ game }) => {
    setCardState(game, 'booting');
    const dot = document.getElementById(game + '_dot');
    if (dot) dot.className = 'status-dot booting';
    const se = document.getElementById(game + '_status');
    if (se) { se.textContent = 'STARTING'; se.style.color = 'var(--yellow)'; }
    toast(game.toUpperCase() + ' starting up...', true);
  });
  sock.on('server:stopped', ({ game, reason }) => {
    applyServerState(game, { running: false, players: 0, booting: false });
    toast(reason === 'inactivity' ? game.toUpperCase() + ' shut down (idle 1hr)' : game.toUpperCase() + ' stopped', true);
    hideShutdownWarning(game);
  });
  sock.on('server:shutdown-warning', ({ game, idleMinutes }) => {
    setCardState(game, 'warning'); showShutdownWarning(game, idleMinutes);
  });
  sock.on('server:provisioning', ({ game }) => toast(game.toUpperCase() + ' provisioning on Linode (~10 min)', true));
  sock.on('server:queue-ready', ({ game, message }) => {
    // Free-tier user just had their slot pop. Reset their REQUEST SERVER button
    // back to baseline so the dashboard refresh shows JOIN SERVER once the
    // game finishes booting.
    const btn = document.getElementById(game + '_request');
    if (btn) {
      btn.classList.remove('sent');
      btn.disabled = false;
      btn.textContent = 'REQUEST SERVER';
    }
    const modal = document.getElementById('queueModal');
    if (modal) modal.remove();
    toast(message || (game.toUpperCase() + ' is ready — your server is starting up.'), true, 6000);
    setTimeout(pollAllGames, 3000);
  });
  sock.on('stats:event', (ev) => {
    if (!ev || !ev.game) return;
    if (UI_SUPPRESSED_EVENT_TYPES.has(ev.type)) return;
    feedEvents.push(ev);
    if (feedEvents.length > feedCap) feedEvents = feedEvents.slice(-feedCap);
    // Re-render so consecutive collapsible events (raid_end) merge their counters.
    if (document.getElementById('eventList')) renderFeed();
    if (ev.type === 'player_join') maybeToastPlayerJoin(ev);
  });
  sock.on('broadcast:live-global', ({ code, game, host }) => {
    const label = (host || 'Someone') + ' is broadcasting ' + (game ? game.toUpperCase() : 'a game');
    toast(label + ' — click to watch', true, 6000);
    const el = document.getElementById('toast');
    if (el && code) {
      el.style.cursor = 'pointer';
      el.onclick = () => { location.href = '/broadcasts/' + code; };
    }
  });
  sock.on('discord:voice-join', ({ user, channel }) => {
    toast((user || 'Someone') + ' joined ' + (channel || 'Discord voice'), true);
  });
  sock.on('stats:chat', (msg) => {
    if (!msg || !msg.game) return;
    appendChatMessage(msg.game, msg);
  });
}

function applyServerState(game, status) {
  const dot = document.getElementById(game + '_dot');
  if (!dot) return;
  const statusEl = document.getElementById(game + '_status');
  const playersEl = document.getElementById(game + '_players');
  const joinEl = document.getElementById(game + '_join');
  const reqEl  = document.getElementById(game + '_request');
  const isOnline  = status.running && !status.booting;
  const isBooting = status.running &&  status.booting;
  dot.className = 'status-dot ' + (isOnline ? 'online' : isBooting ? 'booting' : 'offline');
  if (statusEl) { statusEl.textContent = isOnline ? 'ONLINE' : isBooting ? 'BOOTING' : 'OFFLINE'; statusEl.style.color = isOnline ? 'var(--green)' : isBooting ? 'var(--yellow)' : 'var(--muted)'; }
  if (playersEl) { playersEl.textContent = isOnline ? (status.players||0)+' / '+(status.maxPlayers||0) : '--'; playersEl.className = 'stat-value'+(status.players>0?' green':''); }
  setEl(game+'_map', status.map);
  setEl(game+'_worldSize', status.worldSize ? status.worldSize.toLocaleString() : null);
  setEl(game+'_seed', status.seed);
  setEl(game+'_fps', status.fps!=null ? status.fps.toFixed(0) : null);
  setEl(game+'_maxPlayers', status.maxPlayers);
  if (joinEl) joinEl.style.display = isOnline ? '' : 'none';
  if (reqEl)  reqEl.style.display  = !status.running ? '' : 'none';
  if (isAdmin) { setDisabled(game+'_btnStart',status.running); setDisabled(game+'_btnStop',!status.running); setDisabled(game+'_btnRestart',!status.running); }
  updateConnectInfo(game, status);
  setCardState(game, isOnline ? 'online' : isBooting ? 'booting' : 'offline');
}

function setCardState(game, state) {
  const card = document.getElementById('card_' + game);
  if (!card) return;
  card.classList.remove('state-online','state-booting','state-offline','state-warning');
  card.classList.add('state-' + state);
}

const _warnTimers = {};
function showShutdownWarning(game, idleMin) {
  let el = document.getElementById('warn_' + game);
  if (!el) { el = document.createElement('div'); el.id = 'warn_'+game; el.className = 'shutdown-warning'; document.body.appendChild(el); }
  el.innerHTML = '<strong>' + game.toUpperCase() + '</strong> shutting down in 30s (idle '+idleMin+' min) — join now to keep it alive';
  el.classList.add('show');
  clearTimeout(_warnTimers[game]);
  _warnTimers[game] = setTimeout(() => hideShutdownWarning(game), 35000);
}
function hideShutdownWarning(game) { const el = document.getElementById('warn_'+game); if (el) el.classList.remove('show'); }

function toggleNavMenu() {
  document.getElementById('navMenuBtn').classList.toggle('open');
  document.getElementById('navDropdown').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.nav-menu-wrap');
  if (wrap && !wrap.contains(e.target)) {
    const btn = document.getElementById('navMenuBtn');
    const dd  = document.getElementById('navDropdown');
    if (btn) btn.classList.remove('open');
    if (dd)  dd.classList.remove('open');
  }
});

function connectStatsFeed() {
  var statsSocket = io('/stats', { transports: ['websocket', 'polling'] });
  statsSocket.on('connect', function() {
    statsSocket.emit('stats:subscribe', null);
  });
  statsSocket.on('stats:event', function(ev) {
    feedEvents.push(ev);
    if (feedEvents.length > feedCap) feedEvents = feedEvents.slice(-feedCap);
    if (document.getElementById('eventList')) renderFeed();
  });
}

// Load on init
loadDashboard();
setInterval(loadDashboard, 60000);
</script>
