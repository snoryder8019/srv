<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MadLadsLab Game Servers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #cd412b;
      --accent-dim: #8b2d1d;
      --green: #4caf82;
      --yellow: #e6b800;
      --text: #e0e0e0;
      --muted: #666;
      --blue: #4a7c9e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

    /* Nav */
    nav {
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }
    .nav-brand { color: var(--accent); font-size: 1rem; font-weight: bold; letter-spacing: 0.05em; }
    .nav-brand span { color: var(--muted); font-size: 0.75rem; margin-left: 8px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { color: var(--muted); font-size: 0.8rem; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: inherit; font-size: 0.75rem; padding: 5px 12px; border-radius: 3px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* Layout */
    main { max-width: 1280px; margin: 0 auto; padding: 28px 20px; }
    h2 { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }

    /* 2-column grid */
    .server-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) { .server-grid { grid-template-columns: 1fr; } }

    /* Server Card */
    .server-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-banner {
      width: 100%; height: 90px;
      background-size: cover; background-position: center;
      position: relative;
    }
    .card-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(26,26,26,1) 100%);
    }
    .card-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      margin-top: -28px; position: relative; z-index: 1;
    }
    .game-badge {
      font-size: 0.6rem; font-weight: bold; letter-spacing: 0.1em;
      padding: 2px 8px; border-radius: 2px; background: var(--accent); color: #fff;
    }
    .card-title { color: var(--text); font-size: 0.9rem; flex: 1; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0;
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.offline { background: #444; }
    .status-dot.booting { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Tabs */
    .card-tabs {
      display: flex; border-bottom: 1px solid var(--border); background: #111;
    }
    .card-tab {
      flex: 1; padding: 8px 0; text-align: center; font-size: 0.62rem;
      font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s; background: transparent; border-top: none; border-left: none; border-right: none;
      font-family: inherit;
    }
    .card-tab:hover { color: var(--text); }
    .card-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Stats grid inside tab */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
    }
    .stat {
      background: var(--card); padding: 12px 14px;
    }
    .stat-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-size: 0.95rem; color: var(--text); }
    .stat-value.green { color: var(--green); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.blue { color: var(--blue); }
    .stat-value.muted { color: var(--muted); font-size: 0.85rem; }

    /* 24h stats bar */
    .stats-24h {
      display: flex; gap: 1px; background: var(--border);
    }
    .stat-24h {
      flex: 1; background: #111; padding: 8px 12px; text-align: center;
    }
    .stat-24h-label { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .stat-24h-value { font-size: 0.85rem; color: var(--text); }
    .stat-24h-value.accent { color: var(--accent); }
    .stat-24h-value.green { color: var(--green); }
    .stat-24h-value.yellow { color: var(--yellow); }

    /* Connect bar */
    .connect-bar {
      background: #111; border-top: 1px solid var(--border);
      padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .btn-join {
      background: var(--green); color: #0d0d0d; font-family: inherit;
      font-size: 0.7rem; font-weight: bold; padding: 7px 14px; border-radius: 3px;
      text-decoration: none; letter-spacing: 0.05em; transition: all 0.15s; white-space: nowrap;
    }
    .btn-join:hover { background: #5cc892; }
    .btn-request {
      background: transparent; border: 1px solid var(--yellow); color: var(--yellow);
      font-family: inherit; font-size: 0.68rem; font-weight: bold; padding: 6px 12px;
      border-radius: 3px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; white-space: nowrap;
    }
    .btn-request:hover { background: rgba(230,184,0,0.1); }
    .btn-request.sent { border-color: var(--green); color: var(--green); cursor: default; }

    /* Client-mods chip in the connect bar */
    .btn-mods {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: inherit; font-size: 0.65rem; font-weight: bold; padding: 6px 10px;
      border-radius: 3px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
      white-space: nowrap; transition: all 0.15s;
    }
    .btn-mods:hover { color: var(--text); border-color: var(--muted); }
    .btn-mods.required { border-color: var(--yellow); color: var(--yellow); }
    .btn-mods.required:hover { background: rgba(230,184,0,0.1); }
    .btn-mods.acked { border-color: var(--green); color: var(--green); }

    /* Mods modal */
    .mods-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .mods-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      max-width: 560px; width: 100%; color: var(--text); font-family: inherit;
      max-height: 80vh; display: flex; flex-direction: column;
    }
    .mods-modal-head {
      padding: 18px 22px 12px; border-bottom: 1px solid var(--border);
    }
    .mods-modal-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.12em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .mods-modal-title { font-size: 1.05rem; font-weight: 600; }
    .mods-modal-body { padding: 14px 22px; overflow-y: auto; flex: 1; }
    .mods-modal-foot {
      padding: 12px 22px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px; align-items: center;
    }
    .mod-item {
      border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px;
      margin-bottom: 10px; background: var(--bg);
    }
    .mod-item.required { border-left: 3px solid var(--yellow); }
    .mod-item.info { border-left: 3px solid var(--accent); }
    .mod-item-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .mod-item-name { font-weight: 600; font-size: 0.92rem; }
    .mod-item-version {
      font-size: 0.65rem; color: var(--muted); background: var(--card);
      padding: 2px 6px; border-radius: 2px; letter-spacing: 0.05em;
    }
    .mod-item-tag {
      font-size: 0.6rem; padding: 2px 6px; border-radius: 2px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .mod-item-tag.required { background: var(--yellow); color: #0d0d0d; }
    .mod-item-tag.optional { background: var(--border); color: var(--muted); }
    .mod-item-tag.info { background: var(--accent); color: #fff; }
    .mod-item-notes { font-size: 0.78rem; color: var(--muted); line-height: 1.45; margin: 6px 0 0; }
    .mod-item-action {
      display: inline-block; margin-top: 8px; font-size: 0.7rem; font-weight: bold;
      letter-spacing: 0.05em; padding: 6px 12px; border-radius: 3px;
      background: var(--accent); color: #fff; text-decoration: none;
    }
    .mod-item-action:hover { filter: brightness(1.15); }
    .mods-ack-row {
      flex: 1; display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; color: var(--muted); cursor: pointer; user-select: none;
    }
    .mods-ack-row input { cursor: pointer; }

    /* Leaderboard */
    .leaderboard { padding: 0; }
    .lb-header {
      padding: 10px 14px; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .lb-sort-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: inherit; font-size: 0.55rem; padding: 2px 8px; border-radius: 2px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .lb-sort-btn.active { border-color: var(--accent); color: var(--accent); }
    .lb-row {
      display: flex; align-items: center; padding: 7px 14px; font-size: 0.75rem;
      border-bottom: 1px solid rgba(42,42,42,0.4);
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { width: 22px; color: var(--muted); font-size: 0.65rem; flex-shrink: 0; }
    .lb-rank.gold { color: var(--yellow); }
    .lb-rank.silver { color: #aaa; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; color: var(--text); font-weight: bold; }
    .lb-stat { color: var(--muted); font-size: 0.7rem; width: 60px; text-align: right; }
    .lb-stat.highlight { color: var(--green); }
    .lb-empty { padding: 20px 14px; color: var(--muted); font-size: 0.75rem; font-style: italic; }

    /* Notable events mini-feed */
    .notable-feed { max-height: 200px; overflow-y: auto; }
    .notable-item {
      padding: 5px 14px; font-size: 0.7rem; display: flex;
      align-items: baseline; gap: 8px; border-bottom: 1px solid rgba(42,42,42,0.3);
    }
    .notable-item:last-child { border-bottom: none; }
    .notable-time { color: var(--muted); font-size: 0.58rem; white-space: nowrap; flex-shrink: 0; }
    .notable-icon { font-size: 0.78rem; flex-shrink: 0; }
    .notable-text { color: var(--text); flex: 1; }
    .notable-text .name { color: var(--yellow); font-weight: bold; }

    /* Admin controls */
    .admin-panel { border-top: 1px solid var(--border); padding: 14px 18px; display: none; }
    .admin-panel.visible { display: block; }
    .admin-title { font-size: 0.6rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .btn {
      font-family: inherit; font-size: 0.72rem; font-weight: bold;
      padding: 7px 14px; border-radius: 3px; cursor: pointer;
      border: none; letter-spacing: 0.05em; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-start { background: var(--green); color: #0d0d0d; }
    .btn-stop { background: #333; color: #ff6b6b; border: 1px solid #ff4040; }
    .btn-restart { background: #2a2a00; color: var(--yellow); border: 1px solid var(--yellow); }

    /* In-game chat */
    .chat-section { margin-top: 14px; }
    .chat-label {
      font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em;
      margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between;
    }
    .chat-presence {
      font-size: 0.58rem; color: var(--green); letter-spacing: 0.05em;
      padding: 2px 7px; border-radius: 999px; background: rgba(76,175,130,0.12);
    }
    .chat-presence.offline { color: var(--muted); background: rgba(85,85,85,0.15); }
    .chat-log {
      background: #080808; border: 1px solid var(--border); border-radius: 3px;
      padding: 10px; font-size: 0.72rem; color: var(--text); height: 140px;
      overflow-y: auto; word-break: break-word; margin-bottom: 6px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .chat-msg { display: flex; align-items: baseline; gap: 6px; line-height: 1.35; }
    .chat-msg .who { color: var(--yellow); font-weight: bold; flex-shrink: 0; }
    .chat-msg .body { color: var(--text); }
    .chat-msg .stamp { color: var(--muted); font-size: 0.58rem; margin-left: auto; flex-shrink: 0; }
    .chat-msg.staff .who { color: var(--accent); }
    .chat-msg.staff .body::before { content: '[STAFF] '; color: var(--accent); font-weight: bold; }
    .chat-input-row { display: flex; gap: 6px; }
    .chat-input {
      flex: 1; background: #111; border: 1px solid var(--border); color: var(--text);
      font-family: inherit; font-size: 0.78rem; padding: 7px 10px; border-radius: 3px; outline: none;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-chat {
      background: var(--accent); color: #fff; font-family: inherit;
      font-size: 0.72rem; font-weight: bold; padding: 7px 12px; border: none; border-radius: 3px; cursor: pointer;
    }
    .btn-chat:disabled { opacity: 0.35; cursor: not-allowed; }
    .chat-hint { font-size: 0.58rem; color: var(--muted); margin-top: 4px; font-style: italic; }
    .chat-hint.error { color: var(--accent); font-style: normal; }
    .chat-history-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.58rem; color: var(--muted); margin-bottom: 4px;
    }
    .btn-history {
      background: transparent; color: var(--accent); border: 1px solid var(--border);
      font-family: inherit; font-size: 0.58rem; padding: 2px 8px; cursor: pointer; border-radius: 2px;
    }
    .btn-history:hover { border-color: var(--accent); }
    .btn-history:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-stats { font-style: italic; }

    /* Plugins */
    .plugins-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .plugin-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
    .plugin-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #111; border: 1px solid var(--border); border-radius: 3px; padding: 6px 12px;
    }
    .plugin-name { font-size: 0.78rem; }
    .plugin-name.enabled { color: var(--text); }
    .plugin-name.disabled { color: var(--muted); text-decoration: line-through; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: #333; border-radius: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--green); }
    .toggle-track::after {
      content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%;
      background: #fff; top: 3px; left: 3px; transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

    /* Alert toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: #1a1a1a;
      border: 1px solid var(--border); border-left: 3px solid var(--accent);
      color: var(--text); font-size: 0.78rem; padding: 10px 16px; border-radius: 4px;
      transform: translateY(60px); opacity: 0; transition: all 0.25s;
      z-index: 999; max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok { border-left-color: var(--green); }

    .empty { color: var(--muted); font-size: 0.75rem; padding: 10px 0; }

    /* Live Event Feed */
    .event-feed-section { margin-top: 28px; margin-bottom: 28px; }
    .event-feed {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    }
    .event-feed-header {
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .event-feed-title {
      font-size: 0.62rem; color: var(--accent); text-transform: uppercase;
      letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px;
    }
    .feed-live-dot {
      width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .event-feed-count { font-size: 0.6rem; color: var(--muted); }
    .event-list { max-height: 280px; overflow-y: auto; padding: 6px 0; }
    .event-load-older {
      display: block; width: calc(100% - 36px); margin: 4px 18px 8px;
      padding: 6px 10px; font-size: 0.62rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--accent); background: transparent;
      border: 1px dashed var(--border); border-radius: 4px; cursor: pointer;
    }
    .event-load-older:hover:not(:disabled) { border-color: var(--accent); background: rgba(255,255,255,0.02); }
    .event-load-older:disabled { opacity: 0.5; cursor: default; }
    .event-item {
      padding: 5px 18px; font-size: 0.7rem; display: flex;
      align-items: baseline; gap: 8px; border-bottom: 1px solid rgba(42,42,42,0.3);
    }
    .event-item:last-child { border-bottom: none; }
    .event-time { color: var(--muted); font-size: 0.58rem; white-space: nowrap; flex-shrink: 0; }
    .event-game {
      font-size: 0.5rem; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 1px 5px; border-radius: 2px;
      white-space: nowrap; flex-shrink: 0;
    }
    .event-game.rust { background: rgba(205,65,43,0.2); color: var(--accent); }
    .event-game.valheim { background: rgba(74,124,158,0.2); color: #4a7c9e; }
    .event-game.l4d2 { background: rgba(46,125,50,0.2); color: #4caf50; }
    .event-game.sdtd { background: rgba(123,53,0,0.2); color: #c46200; }
    .event-game.se { background: rgba(43,94,166,0.2); color: #4a8cd6; }
    .event-game.palworld { background: rgba(61,184,122,0.2); color: #3db87a; }
    .event-game.windrose { background: rgba(184,134,58,0.2); color: #d4a34a; }
    .event-icon { font-size: 0.78rem; flex-shrink: 0; }
    .event-text { color: var(--text); flex: 1; }
    .event-text .name { color: var(--yellow); font-weight: bold; }
    .event-count { display: inline-block; margin-left: 6px; padding: 0 5px; border-radius: 8px; background: rgba(255,255,255,0.1); color: var(--muted); font-size: 0.65rem; font-weight: bold; vertical-align: middle; }
    .notable-text .event-count { background: rgba(255,255,255,0.08); }

    /* Windrose-only live stats inside Stats tab */
    .wr-extras { padding: 0 14px 16px; }
    .wr-section-label {
      font-size: 0.58rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin: 16px 0 6px; display: flex; align-items: center; gap: 8px;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .wr-section-label:first-child { border-top: none; padding-top: 0; margin-top: 8px; }
    .wr-section-sub {
      font-size: 0.6rem; color: var(--text); letter-spacing: 0;
      background: rgba(255,255,255,0.05); padding: 1px 7px; border-radius: 999px;
    }
    .wr-combat-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
    }
    .wr-tile {
      background: #0d0d0d; border: 1px solid var(--border); border-radius: 3px;
      padding: 6px 4px; text-align: center;
    }
    .wr-tile .n { font-size: 1.1rem; font-weight: bold; font-family: monospace; }
    .wr-tile .l { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.08em; margin-top: 2px; }
    .wr-tile.boss .n { color: #d4a34a; }
    .wr-tile.mob  .n { color: #f85149; }
    .wr-tile.npc  .n { color: #a371f7; }
    .wr-tile.ship .n { color: #58a6ff; }
    .wr-tile.item .n { color: var(--green); }
    .wr-bars { margin-top: 8px; }
    .wr-bar-row {
      display: grid; grid-template-columns: 1fr 32px; gap: 6px;
      align-items: center; padding: 3px 0;
      font-size: 0.68rem; font-family: monospace;
    }
    .wr-bar-row .lbl { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wr-bar-row .val { color: var(--muted); text-align: right; }
    .wr-bar-track {
      grid-column: 1 / -1;
      height: 2px; background: #161616; border-radius: 1px; overflow: hidden;
      margin: 2px 0 4px;

    .wr-build-token-row { grid-template-columns: 1fr 1fr auto; }

    .wr-build-token-meta { font-size: 0.62rem; color: var(--muted); text-align: right; }
    .btn-mini {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);

    /* All-time stat banner */

    .nav-menu-wrap { position: relative; }

    .nav-menu-btn.open { border-color: var(--accent); }
    .nav-dropdown { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: #111; border: 1px solid var(--border); border-radius: 6px; min-width: 220px; z-index: 200; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
    .nav-dropdown.open { display: block; }
    .nav-dd-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; font-size: 0.78rem; color: var(--muted); text-decoration: none; cursor: pointer; font-family: inherit; background: transparent; border: none; width: 100%; text-align: left; transition: all 0.15s; letter-spacing: 0.03em; }
    .nav-dd-item:hover { background: #1a1a1a; color: var(--text); }
    .nav-dd-admin { color: var(--yellow) !important; }
    .nav-dd-admin:hover { background: #1a1500 !important; }
    .nav-dd-logout:hover { background: #1a0a0a !important; color: var(--accent) !important; }
    .nav-dd-divider { border-top: 1px solid var(--border); margin: 4px 0; }
    .server-card { transition: border-color 0.3s; order: 4; }
    .server-card.state-online  { border-color: #22373a; order: 1; }
    .server-card.state-booting { border-color: #37350a; order: 2; }

    @keyframes warn-pulse { 0%,100%{border-color:#5a1a0a}50%{border-color:#cd412b} }

    .shutdown-warning.show { display: block; }
  </style>
</head>

<script>
let isAdmin = false;

// Per-game world-saves cache + selection. Selection drives which save (if any)

const worldSaves = {};           // { [gameId]: [{id,label,userName,wrapper,mine,...}] }

// ── Game Config (drives card rendering) ──

const API_MAP = {
  rust: 'rust', l4d2: 'l4d2', '7dtd': '7dtd', valheim: 'valheim', se: 'se', palworld: 'palworld', windrose: 'windrose'
};

const STAT24_LABELS = {
  peak: 'PEAK 24H', unique: 'UNIQUE 24H', joins: 'JOINS 24H', kills: 'KILLS 24H',
  deaths: 'DEATHS 24H', bossKills: 'BOSSES 24H', raids: 'RAIDS 24H',
  npcKills: 'NPC KILLS 24H', shipsSunk: 'SHIPS SUNK 24H',
};
const STAT24_COLORS = {
  peak: '', unique: 'green', joins: '', kills: 'accent', deaths: 'accent', bossKills: 'yellow', raids: 'yellow',
  npcKills: 'accent', shipsSunk: 'yellow',
};

// ── Build Cards ──
function buildCards() {
  const grid = document.getElementById('serverGrid');
  grid.innerHTML = GAMES.map(g => buildCard(g)).join('');
}

function buildCard(g) {
  const id = g.id;
  const apiId = API_MAP[id] || id;
  const gameClass = id === '7dtd' ? 'sdtd' : id;

  // Stat 24h items
  const stat24Html = g.stat24.map(k =>
    `<div class="stat-24h"><div class="stat-24h-label">${STAT24_LABELS[k]||k}</div><div class="stat-24h-value ${STAT24_COLORS[k]||''}" id="${id}_24h_${k}">--</div></div>`
  ).join('');

  // Server info tab
  const serverTab = `
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">STATUS</div><div class="stat-value muted" id="${id}_status">--</div></div>
      <div class="stat"><div class="stat-label">PLAYERS</div><div class="stat-value" id="${id}_players">--</div></div>
      ${g.statFields.includes('map') ? `<div class="stat"><div class="stat-label">MAP</div><div class="stat-value muted" id="${id}_map">--</div></div>` : ''}
      ${g.statFields.includes('worldSize') ? `<div class="stat"><div class="stat-label">WORLD SIZE</div><div class="stat-value muted" id="${id}_worldSize">--</div></div>` : ''}
      ${g.statFields.includes('seed') ? `<div class="stat"><div class="stat-label">SEED</div><div class="stat-value muted" id="${id}_seed">--</div></div>` : ''}
      ${g.statFields.includes('fps') ? `<div class="stat"><div class="stat-label">FPS</div><div class="stat-value muted" id="${id}_fps">--</div></div>` : ''}
      ${g.statFields.includes('maxPlayers') ? `<div class="stat"><div class="stat-label">MAX</div><div class="stat-value muted" id="${id}_maxPlayers">--</div></div>` : ''}
    </div>
    <div class="stats-24h">${stat24Html}</div>
    <div class="connect-bar">
      ${g.steam ? `<a href="#" class="btn-join" id="${id}_join" onclick="return joinServer(this)" data-connect="${g.connect}" data-steam="${g.steam}" data-gameid="${id}" style="display:none">JOIN SERVER</a>
        <span class="connect-cmd" id="${id}_connect" onclick="copyConnect(this)" style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:0.78rem;padding:6px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" data-default="${g.connect}" data-uses-invite="${g.usesInviteCode ? '1' : ''}">${g.connect}</span>` :
        `<span class="connect-cmd" id="${id}_connect" onclick="copyConnect(this)" style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--green);font-family:inherit;font-size:0.78rem;padding:6px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" data-default="${g.connect}" data-uses-invite="${g.usesInviteCode ? '1' : ''}">${g.connect}</span>`}
      ${buildModsChip(g)}
      <select class="world-save-pick" id="${id}_worldPick" onchange="onWorldPick('${id}', this.value)" style="display:none;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:0.7rem;padding:5px 6px;border-radius:3px;max-width:170px;">
        <option value="">Fresh world</option>
      </select>
      <button class="btn btn-save-world" id="${id}_saveWorld" onclick="openSaveWorldModal('${id}')" style="display:none;font-size:0.66rem;padding:5px 9px;background:rgba(190,140,40,0.16);border:1px solid #b08a30;color:#ffd58a;border-radius:3px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase">SAVE WORLD</button>

        <button class="lb-sort-btn active" onclick="sortLb('${id}','totalPlaytime',this)">PLAYTIME</button>

      </div>
      <div id="${id}_lb"><div class="lb-empty">Loading...</div></div>
    </div>
    <div style="padding:6px 14px;font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;border-top:1px solid var(--border)">RECENT EVENTS</div>
    <div class="notable-feed" id="${id}_notable"><div class="lb-empty">No events yet</div></div>
    ${id === 'windrose' ? `
    <div class="wr-extras" id="${id}_wrExtras">
      <div class="wr-section-label">COMBAT &middot; 24H <span class="wr-section-sub" id="wr_combatSum">0 actions</span></div>

        <div class="wr-tile boss"><div class="n" id="wr_cnt_boss">0</div><div class="l">BOSS</div></div>

        <div class="wr-tile npc"><div class="n"  id="wr_cnt_npc">0</div><div class="l">NPC</div></div>
        <div class="wr-tile ship"><div class="n" id="wr_cnt_ship">0</div><div class="l">SHIP</div></div>
        <div class="wr-tile item"><div class="n" id="wr_cnt_item">0</div><div class="l">DROP</div></div>
      </div>
      <div class="wr-bars" id="wr_combatBars"><div class="lb-empty">No combat in last 24h</div></div>

      <div class="wr-section-label">WORLD &middot; POIs <span class="wr-section-sub" id="wr_poiTotal">0</span></div>
      <div class="wr-mini-grid" id="wr_poiGrid"><div class="lb-empty">Loading&hellip;</div></div>

      <div class="wr-section-label">RESOURCES <span class="wr-section-sub" id="wr_resSub"></span></div>
      <div class="wr-mini-grid" id="wr_resGrid"><div class="lb-empty">Loading&hellip;</div></div>

      <div class="wr-section-label">MOD HEALTH</div>
      <div class="wr-hooks">
        <div class="wr-hook-bar"><div class="wr-hook-fill" id="wr_hookFill"></div></div>
        <div class="wr-hook-label" id="wr_hookLabel">&mdash; hooks live</div>
      </div>

      <div class="wr-section-label">RCON BRIDGE</div>
      <div class="wr-rcon-row">
        <span class="wr-rcon-state" id="wr_rconState">unknown</span>
        <span class="wr-rcon-detail" id="wr_rconDetail">&mdash;</span>
      </div>
    </div>` : ''}`;

  // Live tab — admin controls + plugins + in-game chat (RCON console removed)
  const controlsTab = `
    <div class="admin-panel visible" id="${id}_admin">
      <a class="btn btn-voice" id="${id}_btnVoice" href="#" target="_blank" rel="noopener"
         style="display:none;background:#5865f2;color:#fff;text-decoration:none;margin-bottom:8px;text-align:center"
         title="Join the ${g.name} voice channel in Discord. You'll be kicked from the server when you disconnect.">
        🎤 JOIN ${g.name.toUpperCase()} VOICE
      </a>
      <div class="admin-title" id="${id}_adminTitle">Server Controls</div>
      <div class="btn-row" id="${id}_btnRow">
        <button class="btn btn-start" id="${id}_btnStart" onclick="gameAction('${apiId}','start','${id}')">&#9654; START</button>
        <button class="btn btn-stop" id="${id}_btnStop" onclick="gameAction('${apiId}','stop','${id}')">&#9632; STOP</button>
        <button class="btn btn-restart" id="${id}_btnRestart" onclick="gameAction('${apiId}','restart','${id}')">&#8634; RESTART</button>
        <button class="btn" id="${id}_btnBroadcast" style="background:#cd412b;margin-left:auto;color:#fff" onclick="playBroadcast('${id}')">&#9654; BROADCAST</button>
      </div>
      <div class="chat-section" id="${id}_chatSection">
        <div class="chat-label">
          IN-GAME CHAT
          <span class="chat-presence" id="${id}_chatPresence">0 in-game</span>
        </div>
        <div class="chat-history-bar">
          <span class="chat-stats" id="${id}_chatStats">channel history</span>
          <button class="btn-history" id="${id}_chatLoadOlder" onclick="loadOlderChat('${id}')">&#8593; Load older</button>
        </div>
        <div class="chat-log" id="${id}_chatLog"><div class="empty">No messages yet</div></div>
        <div class="chat-input-row">
          <input class="chat-input" id="${id}_chatInput"
                 placeholder="Join the server to chat…"
                 disabled
                 maxlength="240"
                 onkeydown="if(event.key==='Enter')sendChat('${id}')">
          <button class="btn-chat" id="${id}_chatBtn" onclick="sendChat('${id}')" disabled>SEND</button>
        </div>
        <div class="chat-hint" id="${id}_chatHint">Sign in &amp; appear in the live player list to post.</div>
      </div>
      ${g.pluginType ? `
      <div class="plugins-section">
        <div class="admin-title">${g.pluginType}</div>

      </div>` : ''}
    </div>`;

  return `
  <div class="server-card" id="card_${id}">
    <div class="card-banner" style="background-image:url('${g.img}')"></div>
    <div class="card-header">
      <span class="game-badge" style="background:${g.color}">${g.badge}</span>
      <span class="card-title">${g.name}</span>
      <div class="status-dot offline" id="${id}_dot"></div>
    </div>
    <div class="card-tabs">
      <button class="card-tab active" onclick="switchTab('${id}','server',this)">Server</button>
      <button class="card-tab" onclick="switchTab('${id}','stats',this)">Stats</button>
      <button class="card-tab" onclick="switchTab('${id}','controls',this)" id="${id}_controlsTab">Live</button>
      ${id === 'windrose' ? `<button class="card-tab" onclick="switchTab('${id}','map',this)">Map</button>` : ''}
      ${id === 'windrose' ? `<button class="card-tab" onclick="switchTab('${id}','build',this)" id="${id}_buildTab" style="display:none">Build</button>` : ''}
    </div>
    <div class="tab-panel active" id="${id}_panel_server">${serverTab}</div>
    <div class="tab-panel" id="${id}_panel_stats">${statsTab}</div>
    <div class="tab-panel" id="${id}_panel_controls">${controlsTab}</div>
    ${id === 'windrose' ? `<div class="tab-panel" id="${id}_panel_map">${mapTabHtml()}</div>` : ''}
    ${id === 'windrose' ? `<div class="tab-panel" id="${id}_panel_build">${buildTabHtml()}</div>` : ''}

}

function switchTab(gameId, tab, btn) {
  ['server','stats','controls','build','map'].forEach(t => {
    const panel = document.getElementById(gameId + '_panel_' + t);
    if (panel) panel.classList.toggle('active', t === tab);
  });
  btn.parentElement.querySelectorAll('.card-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (gameId === 'windrose' && tab === 'build') wrBuildOnOpen();
  if (gameId === 'windrose' && tab === 'map')   wrMapOnOpen();
}

// ── Windrose Map tab (public, signed-in players) ──
let _wrMapLoaded = false;
async function wrMapOnOpen() {
  // Always re-fetch the overlay files (cache-busted) so a mod-author edit
  // becomes visible without a hard reload.
  const slot = document.getElementById('windrose_map_ext_slot');
  if (!slot) return;
  try {
    const cb = Date.now();
    const [html, state] = await Promise.all([
      fetch(`/static/windrose-map/extension.html?cb=${cb}`).then(r => r.text()),
      fetch('/windrose-map/api/state', { credentials: 'same-origin' }).then(r => r.ok ? r.json() : null),
    ]);
    slot.innerHTML = html;
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = `/static/windrose-map/extension.js?cb=${cb}`;
      s.onload = resolve;
      s.onerror = () => reject(new Error('extension.js failed to load'));
      document.body.appendChild(s);
    });
    if (window.windroseMapExt && typeof window.windroseMapExt.boot === 'function') {
      window.windroseMapExt.boot({
        panel: slot,
        state,
        api: (method, path, body) => fetch('/windrose-map/api' + path, {
          method, credentials: 'same-origin',
          headers: body ? { 'Content-Type': 'application/json' } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        }).then(r => r.json()),
      });
    }
    _wrMapLoaded = true;
  } catch (e) {
    slot.innerHTML = `<div class="lb-empty">Map load failed: ${escapeHtml(e.message)}</div>`;
  }
}

// ── Windrose Build tab (admin-only MCP control panel) ──
let _wrBuildLoaded = false;
function wrBuildOnOpen() {
  if (_wrBuildLoaded) return;
  _wrBuildLoaded = true;
  wrBuildLoadStatus();
  wrBuildLoadTokens();
  wrBuildLoadOverlay();
}

async function wrBuildLoadStatus() {
  try {
    const r = await fetch('/mcp/windrose/status', { credentials: 'same-origin' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const s = await r.json();
    document.getElementById('wr_build_endpoint').textContent = location.origin + s.endpoint;
    const mods = s.mods || {};
    const declared = Array.isArray(mods.declared) ? mods.declared : [];
    const orphans = Array.isArray(mods.onDiskButNotDeclared) ? mods.onDiskButNotDeclared : [];
    const modsEl = document.getElementById('wr_build_mods');
    modsEl.innerHTML = declared.length
      ? declared.map(m => `
          <div class="wr-build-mod-row">
            <span class="wr-build-mod-status ${m.enabled ? 'on' : 'off'}">${m.enabled ? '●' : '○'}</span>
            <span class="wr-build-mod-name">${escapeHtml(m.name)}</span>
            <span class="wr-build-mod-toggle">${m.enabled ? 'enabled' : 'disabled'}</span>
          </div>
        `).join('') + (orphans.length
          ? `<div class="wr-build-hint" style="margin-top:6px">${orphans.length} mod dir(s) on disk but not in mods.txt: ${orphans.map(escapeHtml).join(', ')}</div>`
          : '')
      : '<div class="lb-empty">No mods declared</div>';
    document.getElementById('wr_build_log').textContent = (s.ue4ssTail || []).join('\n') || '(log not yet on disk)';
  } catch (e) {
    document.getElementById('wr_build_mods').innerHTML = `<div class="lb-empty">Status load failed: ${escapeHtml(e.message)}</div>`;
  }
}

async function wrBuildLoadTokens() {
  try {
    const r = await fetch('/mcp/windrose/tokens', { credentials: 'same-origin' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { tokens } = await r.json();
    const active = (tokens || []).filter(t => t.active);
    const el = document.getElementById('wr_build_tokens');
    el.innerHTML = active.length
      ? active.map(t => `
          <div class="wr-build-token-row">
            <span class="wr-build-token-label">${escapeHtml(t.label)}</span>
            <span class="wr-build-token-meta">${t.callCount} calls · last ${t.lastUsedAt ? new Date(t.lastUsedAt).toLocaleString() : 'never'}</span>
            <button class="btn-mini btn-mini-danger" onclick="wrBuildRevokeToken('${t.id}')">Revoke</button>
          </div>
        `).join('')
      : '<div class="lb-empty">No active tokens. Mint one to share with a mod author.</div>';
  } catch (e) {
    document.getElementById('wr_build_tokens').innerHTML = '<div class="lb-empty">Token load failed</div>';
  }
}

async function wrBuildMintToken() {
  const label = (document.getElementById('wr_build_token_label').value || '').trim() || 'mod-builder';
  try {
    const r = await fetch('/mcp/windrose/tokens', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const out = await r.json();
    const box = document.getElementById('wr_build_new_token');
    box.style.display = '';
    box.innerHTML = `
      <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--green);margin-bottom:4px">NEW TOKEN — copy now, it will not be shown again</div>
      <code style="display:block;font-family:ui-monospace,monospace;word-break:break-all;color:var(--text)">${escapeHtml(out.token)}</code>
      <button class="btn-mini" style="margin-top:6px" onclick="navigator.clipboard?.writeText('${out.token}')">Copy token</button>`;
    document.getElementById('wr_build_token_label').value = '';
    wrBuildLoadTokens();
  } catch (e) {
    alert('Mint failed: ' + e.message);
  }
}

async function wrBuildRevokeToken(id) {
  if (!confirm('Revoke this token? Anyone holding it will be locked out immediately.')) return;
  try {
    const r = await fetch('/mcp/windrose/tokens/' + encodeURIComponent(id) + '/revoke', {
      method: 'POST', credentials: 'same-origin',
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    wrBuildLoadTokens();
  } catch (e) {
    alert('Revoke failed: ' + e.message);
  }
}

async function wrBuildLoadOverlay() {
  const slot = document.getElementById('windrose_build_ext_slot');
  try {
    const cb = Date.now();
    const html = await fetch(`/static/windrose-build/extension.html?cb=${cb}`).then(r => r.text());
    slot.innerHTML = html;
    // Inject the overlay script. Existing extension.js sets window.windroseBuildExt.
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = `/static/windrose-build/extension.js?cb=${cb}`;
      s.onload = resolve;
      s.onerror = () => reject(new Error('extension.js failed to load'));
      document.body.appendChild(s);
    });
    if (window.windroseBuildExt && typeof window.windroseBuildExt.boot === 'function') {
      let status = null;
      try {
        status = await fetch('/mcp/windrose/status', { credentials: 'same-origin' }).then(r => r.ok ? r.json() : null);
      } catch (_e) { status = null; }
      window.windroseBuildExt.boot({
        panel: slot,
        status,
        api: (method, path, body) => fetch('/mcp/windrose' + path, {
          method, credentials: 'same-origin',
          headers: body ? { 'Content-Type': 'application/json' } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        }).then(r => r.json()),

  } catch (e) {

function wrBuildCopyEndpoint() {
  const url = document.getElementById('wr_build_endpoint').textContent.trim();
  navigator.clipboard?.writeText(url);
}
function wrBuildCopyConfig() {
  const url = document.getElementById('wr_build_endpoint').textContent.trim();
  const cfg = {
    mcpServers: {
      windrose: {
        type: 'http',
        url,
        headers: { Authorization: 'Bearer <PASTE_TOKEN_HERE>' },
      },
    },
  };
  navigator.clipboard?.writeText(JSON.stringify(cfg, null, 2));
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ── Init ──
async function init() {
  const me = await api('GET', '/api/me');
  if (!me) return (location.href = '/login');
  document.getElementById('navUser').textContent = me.username || 'Player';
  isAdmin = me.isAdmin || (me.permissions && me.permissions.games === 'admin');
  isPremium = !!me.premium;
  canManageWorlds = !!me.canManageWorlds || isAdmin || isPremium;
  if (isAdmin) {
    var al=document.getElementById('adminLink'); if(al) al.style.display='';
  }
  // Build tab on the Windrose card is admin-only — token minting + UI overlay
  // editing live behind it.
  if (isAdmin) {
    setTimeout(() => {
      const bt = document.getElementById('windrose_buildTab');
      if (bt) bt.style.display = '';
    }, 0);
  }

  // Strip titles an admin has hidden from public view (admin/server-control toggle).
  try {
    const h = await fetch('/admin/api/hidden-games').then(r => r.json());
    const hide = new Set(h.hidden || []);
    if (hide.size) GAMES = GAMES.filter(g => !hide.has(g.id));
  } catch (e) {}

  buildCards();

  // Non-admins still see the Live tab (it carries the in-game chat), but the
  // start/stop/restart row + broadcast + plugin panel are admin-only.
  GAMES.forEach(g => {
    if (!isAdmin) {
      const btnRow = document.getElementById(g.id + '_btnRow');
      if (btnRow) btnRow.style.display = 'none';
      const title = document.getElementById(g.id + '_adminTitle');
      if (title) title.style.display = 'none';
      // The plugin panel is wrapped in its own .plugins-section; hide it too.
      const plugList = document.getElementById(g.id + '_pluginList');
      if (plugList && plugList.parentElement) plugList.parentElement.style.display = 'none';
    } else if (g.pluginApi) {
      loadPlugins(g.id, g.pluginApi);
    }
    // Chat is loaded for every visitor — non-admins can read; only matched
    // in-game players can post (gated server-side and reflected in the UI).
    loadChat(g.id);
  });

  pollAllGames();
  pollInterval = setInterval(pollAllGames, 15000);
  // Refresh chat presence + history every 20s as a fallback for the socket.
  setInterval(() => { GAMES.forEach(g => loadChat(g.id)); }, 20000);

  if (canManageWorlds) {
    GAMES.forEach(g => loadWorldSaves(g.id));
    // Reload every 60s so newly-named saves from another admin show up.
    setInterval(() => { GAMES.forEach(g => loadWorldSaves(g.id)); }, 60000);
  }

  loadVoiceInvites();
}

// Per-game Discord voice-channel join buttons. The discord bot mints temporary
// channel-scoped invites and the portal exposes them at /api/discord/voice-invites.
async function loadVoiceInvites() {
  try {
    const map = await api('GET', '/api/discord/voice-invites') || {};
    GAMES.forEach(g => {
      const url = map[g.id];
      const btn = document.getElementById(g.id + '_btnVoice');
      if (btn && url) {
        btn.href = url;
        btn.style.display = '';
      }
    });
  } catch (e) { /* invites are optional — bot may be offline */ }
}

// ── Poll all games ──
async function pollAllGames() {
  for (const g of GAMES) {
    pollGame(g);
  }
}

async function pollGame(g) {
  if (g.isPrivate) {
    const dot = document.getElementById(g.id + '_dot');
    const statusEl = document.getElementById(g.id + '_status');
    const playersEl = document.getElementById(g.id + '_players');
    if (dot) dot.className = 'status-dot online';
    if (statusEl) { statusEl.textContent = 'AVAILABLE'; statusEl.style.color = 'var(--green)'; }
    if (playersEl) { playersEl.textContent = 'Private'; playersEl.className = 'stat-value green'; }
    setCardState(g.id, 'online');
    return;
  }
  const id = g.id;
  const apiId = API_MAP[id] || id;
  let s = await api('GET', `/api/${apiId}/status`);
  if (!s) return;

  // If the local server isn't running, see whether a Linode is hosting this game.
  if (!s.running) {
    try {
      const r = await fetch('/servers/api/provisioned-status/' + apiId);
      if (r.ok) {
        const rs = await r.json();
        if (rs && rs.active) {
          s = {
            running: true,
            booting: !rs.ready,
            players: s.players || 0,
            maxPlayers: s.maxPlayers || 0,
            map: s.map || null,
            remoteConnect: rs.connect,
            remoteSteam: rs.steam,
            remotePassword: rs.password,
          };
        }
      }
    } catch (e) {}
  }

  const dot = document.getElementById(id + '_dot');
  const statusEl = document.getElementById(id + '_status');

  dot.className = 'status-dot';
  if (s.running && !s.booting) {
    dot.classList.add('online');
    statusEl.textContent = 'ONLINE'; statusEl.style.color = 'var(--green)';
    setCardState(id, 'online');
  } else if (s.booting) {
    dot.classList.add('booting');
    statusEl.textContent = 'BOOTING'; statusEl.style.color = 'var(--yellow)';
    setCardState(id, 'booting');
  } else {
    dot.classList.add('offline');
    statusEl.textContent = 'OFFLINE'; statusEl.style.color = 'var(--muted)';
    setCardState(id, 'offline');
  }

  const playersEl = document.getElementById(id + '_players');
  playersEl.textContent = s.running && !s.booting ? `${s.players} / ${s.maxPlayers}` : '--';
  playersEl.className = 'stat-value' + (s.players > 0 ? ' green' : '');

  setEl(id + '_map', s.map);
  setEl(id + '_worldSize', s.worldSize ? s.worldSize.toLocaleString() : null);
  setEl(id + '_seed', s.seed);
  setEl(id + '_fps', s.fps != null ? s.fps.toFixed(0) : null);
  setEl(id + '_maxPlayers', s.maxPlayers);

  if (isAdmin) {
    setDisabled(id + '_btnStart', s.running);
    setDisabled(id + '_btnStop', !s.running);
    setDisabled(id + '_btnRestart', !s.running);
  }

  const joinEl = document.getElementById(id + '_join');
  const reqEl = document.getElementById(id + '_request');
  if (joinEl) joinEl.style.display = (s.running && !s.booting) ? '' : 'none';
  if (reqEl) reqEl.style.display = (!s.running) ? '' : 'none';
  updateWorldControls(id, s);

  // Update dynamic connect info (invite codes, server names, etc.)
  updateConnectInfo(id, s);
}

function updateConnectInfo(id, s) {
  const el = document.getElementById(id + '_connect');
  if (!el) return;
  const usesInvite = el.dataset.usesInvite === '1';
  const staticLabel = el.dataset.default || '';
  // When a Linode is hosting this game, prefer its address over the local label.
  const activeLabel = s.remoteConnect || staticLabel;
  // Direct-connect mode (Windrose) bypasses the invite-code matchmaker — surface the IP:port.
  if (s.running && !s.booting && s.directConnect && s.directConnect.enabled && s.directConnect.address) {
    el.textContent = 'Direct: ' + s.directConnect.address;
    el.dataset.copy = s.directConnect.address;
    el.style.color = 'var(--green)';
  } else if (s.running && !s.booting && usesInvite && s.inviteCode) {
    el.textContent = 'Invite: ' + s.inviteCode;
    el.dataset.copy = s.inviteCode;
    el.style.color = 'var(--green)';
  } else if (s.running && !s.booting && usesInvite && s.serverName) {
    el.textContent = s.serverName + ' (invite code pending)';
    el.dataset.copy = '';
    el.style.color = 'var(--yellow)';
  } else if (s.running && s.booting) {
    el.textContent = s.remoteConnect ? 'Linode booting... ' + s.remoteConnect : 'Server booting...';
    el.dataset.copy = '';
    el.style.color = 'var(--yellow)';
  } else if (s.running && usesInvite) {
    el.textContent = 'Waiting for invite code...';
    el.dataset.copy = '';
    el.style.color = 'var(--yellow)';
  } else if (s.running) {
    el.textContent = activeLabel || 'Server online';
    el.dataset.copy = activeLabel;
    el.style.color = 'var(--green)';
  } else {
    el.textContent = 'Server offline';
    el.dataset.copy = '';
    el.style.color = 'var(--muted)';
  }

  // Promote the remote Linode password when hosting remotely; otherwise restore the static one.
  const pwEl = document.getElementById(id + '_password');
  if (pwEl) {
    const staticPw = pwEl.dataset.default || '';
    const effectivePw = s.remotePassword || (s.running ? staticPw : staticPw);
    updatePassword(id, effectivePw);
  }

  // Wire up the Steam join button's href for remote Linodes too.
  const joinEl = document.getElementById(id + '_join');
  if (joinEl && s.remoteSteam) {
    joinEl.dataset.connect = s.remoteConnect || joinEl.dataset.connect;
    joinEl.dataset.steam = s.remoteSteam;
  }
}

function copyConnect(el) {
  const text = el.dataset.copy || el.textContent;
  if (!text || text === '--') return;
  navigator.clipboard.writeText(text);
  const orig = el.textContent;
  el.textContent = 'COPIED!';
  setTimeout(() => { el.textContent = orig; }, 2000);
}

function copyPassword(el) {
  const text = el.dataset.copy || '';
  if (!text || text === '—') return;
  navigator.clipboard.writeText(text);
  const orig = el.textContent;
  el.textContent = 'COPIED!';
  setTimeout(() => { el.textContent = orig; }, 2000);
}

function updatePassword(id, password) {
  const row = document.getElementById(id + '_pwbar');
  const el = document.getElementById(id + '_password');
  if (!row || !el) return;
  if (password) {
    row.style.display = 'flex';
    el.textContent = password;
    el.dataset.copy = password;

    row.style.display = 'none';

function setEl(id, val) {
  const el = document.getElementById(id);

}
function setDisabled(id, disabled) {

  if (el) el.disabled = disabled;
}

// ── Game Actions ──

// ── PLAY: Start server + broadcast ──
async function playBroadcast(game) {

  const bcRes = await api('POST', '/broadcasts/api/create', { game });

// ── In-game chat ──
// State is keyed by id (the same key used everywhere in this page — windrose,
// rust, etc.) so the socket handler can append to the right card without an
// extra lookup.
const chatState = {}; // id → { canPost, presence: {count, names} }

function chatRowHtml(m) {
  const stamp = new Date(m.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const cls = m.isAdmin ? 'chat-msg staff' : 'chat-msg';
  return '<div class="' + cls + '">'
    + '<span class="who">' + esc(m.name || 'Player') + ':</span>'
    + '<span class="body">' + esc(m.message || '') + '</span>'
    + '<span class="stamp">' + stamp + '</span>'
    + '</div>';
}

function renderChatPresence(id, presence, canPost) {
  const p = document.getElementById(id + '_chatPresence');
  if (p) {
    p.textContent = (presence?.count || 0) + ' in-game';
    p.className = 'chat-presence' + (presence && presence.count ? '' : ' offline');
  }
  const input = document.getElementById(id + '_chatInput');
  const btn   = document.getElementById(id + '_chatBtn');
  const hint  = document.getElementById(id + '_chatHint');
  if (input && btn && hint) {
    if (canPost) {
      input.disabled = false; btn.disabled = false;
      input.placeholder = 'Say something to the table…';
      hint.textContent = '';
    } else {
      input.disabled = true; btn.disabled = true;
      input.placeholder = 'Join the server to chat…';
      hint.textContent = presence && presence.count
        ? 'Your portal name doesn’t match any active player. Join the game to post.'
        : 'No one is in the game right now.';
      hint.className = 'chat-hint';
    }
  }
}

async function loadChat(id) {
  const data = await api('GET', '/api/chat/' + id);
  if (!data || data.error) return;
  chatState[id] = {
    canPost: !!data.canPost,
    presence: data.presence,
    earliestTs: (data.messages && data.messages[0] && data.messages[0].ts) || null,
    hasMore: true, // assume there may be older messages until /history says otherwise
  };
  const log = document.getElementById(id + '_chatLog');
  if (log) {
    log.innerHTML = (data.messages || []).length
      ? data.messages.map(chatRowHtml).join('')
      : '<div class="empty">No messages yet</div>';
    log.scrollTop = log.scrollHeight;
  }
  renderChatPresence(id, data.presence, data.canPost);
  // Backfill channel-wide stats line (total messages, unique posters).
  fetch('/api/chat/' + id + '/stats').then(r => r.json()).then(s => {
    const el = document.getElementById(id + '_chatStats');
    if (!el || !s || s.error) return;
    const t = s.total || 0;
    const u = s.uniquePosters || 0;
    el.textContent = t === 0 ? 'channel history empty'
      : t + ' message' + (t === 1 ? '' : 's') + ' · ' + u + ' poster' + (u === 1 ? '' : 's');
  }).catch(() => {});
}

async function loadOlderChat(id) {
  const state = chatState[id];
  if (!state || state.hasMore === false) return;
  const btn = document.getElementById(id + '_chatLoadOlder');
  if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
  const before = state.earliestTs ? encodeURIComponent(state.earliestTs) : '';
  const data = await api('GET', '/api/chat/' + id + '/history?limit=50' + (before ? '&before=' + before : ''));
  if (btn) btn.textContent = '↑ Load older';
  if (!data || data.error || !Array.isArray(data.messages)) { if (btn) btn.disabled = false; return; }
  const log = document.getElementById(id + '_chatLog');
  if (log) {
    if (log.querySelector('.empty')) log.innerHTML = '';
    if (data.messages.length === 0) {
      state.hasMore = false;
      if (btn) { btn.textContent = '— start of channel —'; btn.disabled = true; }
      return;
    }
    // Preserve scroll position so the user keeps their place while older
    // messages are inserted at the top.
    const prevScrollHeight = log.scrollHeight;
    log.insertAdjacentHTML('afterbegin', data.messages.map(chatRowHtml).join(''));
    log.scrollTop = log.scrollHeight - prevScrollHeight;
    state.earliestTs = data.messages[0].ts;
    state.hasMore = !!data.hasMore;
    if (btn) {
      if (!state.hasMore) { btn.textContent = '— start of channel —'; btn.disabled = true; }
      else btn.disabled = false;
    }
  }
}

async function sendChat(id) {
  const input = document.getElementById(id + '_chatInput');
  if (!input || input.disabled) return;
  const message = input.value.trim();
  if (!message) return;
  const res = await api('POST', '/api/chat/' + id, { message });
  if (!res || res.error) {
    const hint = document.getElementById(id + '_chatHint');
    if (hint) {
      hint.textContent = res && res.code === 'NOT_IN_GAME'
        ? 'You’re not in the live player list right now — join the game to post.'
        : (res?.error || 'Send failed');
      hint.className = 'chat-hint error';
    }
    return;
  }
  input.value = '';
  // Socket will broadcast the message back to us — no need to optimistically
  // append; if the socket is down, the next poll will pick it up.
}

function appendChatMessage(id, msg) {
  const log = document.getElementById(id + '_chatLog');
  if (!log) return;
  // First message replaces the empty placeholder.
  if (log.querySelector('.empty')) log.innerHTML = '';
  log.insertAdjacentHTML('beforeend', chatRowHtml(msg));
  log.scrollTop = log.scrollHeight;
}

// ── Plugins ──
async function loadPlugins(id, apiUrl) {
  const data = await api('GET', apiUrl);
  const list = document.getElementById(id + '_pluginList');
  if (!list) return;
  const plugins = Array.isArray(data) ? data : (data && data.plugins ? data.plugins : []);
  if (!plugins.length) {
    list.innerHTML = '<div class="empty">No plugins found</div>';
    return;
  }
  list.innerHTML = plugins.map(p => `
    <div class="plugin-item">
      <span class="plugin-name ${p.enabled ? 'enabled' : 'disabled'}">${esc(p.name)}</span>
      <label class="toggle">
        <input type="checkbox" ${p.enabled ? 'checked' : ''} onchange="togglePlugin('${id}','${esc(p.file).replace(/'/g,"\\'")}',this.checked)">
        <span class="toggle-track"></span>
      </label>
    </div>
  `).join('');
}

async function togglePlugin(id, file, enable) {
  const apiId = API_MAP[id] || id;
  const endpoint = (id === '7dtd' || id === 'se') ? 'mods' : 'plugins';
  const res = await api('POST', `/api/${apiId}/${endpoint}/${encodeURIComponent(file)}/toggle`, { enable });
  if (res) toast(res.ok ? `${enable ? 'Enabled' : 'Disabled'}` : (res.message || 'Error'), res.ok);
}

// ── Join / Request ──
// ── Client mods (per-game required/optional install hints on the connect bar) ──
function modsAckKey(id) { return 'mods_ack:' + id; }
function modsAcked(id) {
  try { return localStorage.getItem(modsAckKey(id)) === '1'; } catch (e) { return false; }
}
function buildModsChip(g) {
  var mods = g.clientMods || [];
  if (!mods.length) return '';
  var required = mods.some(function(m){ return m.required; });
  var acked = modsAcked(g.id);
  var cls = 'btn-mods' + (required ? ' required' : '') + (required && acked ? ' acked' : '');
  var label = required
    ? (acked ? '✓ MODS · ' + mods.length : '⚠ MODS · ' + mods.length)
    : '📦 MODS · ' + mods.length;
  return '<button class="' + cls + '" id="' + g.id + '_modsChip" onclick="openModsModal(\'' + g.id + '\')">' + label + '</button>';
}
function refreshModsChip(id) {
  var g = GAMES.find(function(x){ return x.id === id; });
  if (!g) return;
  var oldChip = document.getElementById(id + '_modsChip');
  if (!oldChip) return;
  var wrap = document.createElement('div');
  wrap.innerHTML = buildModsChip(g).trim();
  if (wrap.firstChild) oldChip.replaceWith(wrap.firstChild);
}
function openModsModal(id) {
  var g = GAMES.find(function(x){ return x.id === id; });
  if (!g || !g.clientMods || !g.clientMods.length) return;
  closeModsModal();
  var hasRequired = g.clientMods.some(function(m){ return m.required; });
  var items = g.clientMods.map(function(m) {
    var typeClass = m.installer === 'info' ? 'info' : (m.required ? 'required' : '');
    var tag = m.installer === 'info'
      ? '<span class="mod-item-tag info">Info</span>'
      : (m.required ? '<span class="mod-item-tag required">Required</span>' : '<span class="mod-item-tag optional">Optional</span>');
    var version = m.version ? '<span class="mod-item-version">' + esc(m.version) + '</span>' : '';
    var notes = m.notes ? '<p class="mod-item-notes">' + esc(m.notes) + '</p>' : '';
    var actionLabel = ({
      'mod-launcher': 'Open Mod Launcher',
      'thunderstore': 'Open Thunderstore',
      'r2modman': 'Install via r2modman',
      'steam-workshop': 'Open Steam Workshop',
      'manual': 'Download',
    })[m.installer] || null;
    var action = (m.url && actionLabel)
      ? '<a class="mod-item-action" href="' + esc(m.url) + '" target="_blank" rel="noopener">' + actionLabel + ' ↗</a>'
      : '';
    return '<div class="mod-item ' + typeClass + '">' +
             '<div class="mod-item-head">' +
               '<span class="mod-item-name">' + esc(m.name) + '</span>' +
               version + tag +
             '</div>' + notes + action +
           '</div>';
  }).join('');
  var ackRow = hasRequired
    ? '<label class="mods-ack-row"><input type="checkbox" id="modsAckChk" ' + (modsAcked(id) ? 'checked' : '') + ' onchange="ackMods(\'' + id + '\', this.checked)"> I have installed the required mods</label>'
    : '<div style="flex:1"></div>';
  var modal = document.createElement('div');
  modal.id = 'modsModal';
  modal.className = 'mods-modal-overlay';
  modal.onclick = function(e) { if (e.target === modal) closeModsModal(); };
  modal.innerHTML =
    '<div class="mods-modal">' +
      '<div class="mods-modal-head">' +
        '<div class="mods-modal-eyebrow">' + esc(g.name) + ' · Client setup</div>' +
        '<div class="mods-modal-title">' + (hasRequired ? 'Required mods & install steps' : 'Client info & optional mods') + '</div>' +
      '</div>' +
      '<div class="mods-modal-body">' + items + '</div>' +
      '<div class="mods-modal-foot">' +
        ackRow +
        '<button class="btn" onclick="closeModsModal()">Close</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}
function closeModsModal() {
  var m = document.getElementById('modsModal');
  if (m) m.remove();
}
function ackMods(id, checked) {
  try {
    if (checked) localStorage.setItem(modsAckKey(id), '1');
    else localStorage.removeItem(modsAckKey(id));
  } catch (e) {}
  refreshModsChip(id);
}

function joinServer(el) {
  var gameId = el.dataset.gameid;
  var g = gameId ? GAMES.find(function(x){ return x.id === gameId; }) : null;
  if (g && g.clientMods && g.clientMods.some(function(m){ return m.required; }) && !modsAcked(gameId)) {
    openModsModal(gameId);
    toast('Confirm you\'ve installed the required mods before joining', false);
    return false;
  }
  var connectCmd = el.dataset.connect;
  navigator.clipboard.writeText(connectCmd).then(function() {
    el.textContent = 'COPIED!';
    setTimeout(function() { el.textContent = 'JOIN SERVER'; }, 2500);
  });
  return false;
}

// ── Saved Worlds (admin / premium) ──────────────────────────────────────────
async function loadWorldSaves(game) {
  try {
    var r = await fetch('/servers/api/world-saves/' + game);
    if (!r.ok) return;
    var d = await r.json();
    worldSaves[game] = d.saves || [];
    renderWorldPick(game);
  } catch (e) {}
}

function renderWorldPick(game) {
  var sel = document.getElementById(game + '_worldPick');
  if (!sel) return;
  var saves = worldSaves[game] || [];
  // Build options, preserving the currently-selected value if it still exists.
  var current = worldPick[game] || '';
  var html = '<option value="">Fresh world</option>';
  saves.forEach(function(s) {
    var who = s.mine ? 'You' : (s.userName || 'Someone');
    var labelTxt = s.label || ('Save ' + new Date(s.createdAt).toLocaleDateString());
    var wrap = s.wrapper && s.wrapper !== 'native' ? ' · ' + s.wrapper : '';
    html += '<option value="' + esc(s.id) + '">' + esc(labelTxt) + ' — ' + esc(who) + esc(wrap) + '</option>';
  });
  sel.innerHTML = html;
  if (current && saves.some(function(s){return s.id===current;})) sel.value = current;
  else worldPick[game] = '';
}

function onWorldPick(game, id) {
  worldPick[game] = id || '';
}

// Toggle the saved-worlds dropdown visibility alongside REQUEST SERVER, and
// the "Save World" button alongside JOIN SERVER. Called from updateConnectInfo
// once we know the server's running state.
function updateWorldControls(game, status) {
  if (!canManageWorlds) return;
  var pick = document.getElementById(game + '_worldPick');
  var save = document.getElementById(game + '_saveWorld');
  var isOnline = status && status.running && !status.booting;
  if (pick) pick.style.display = (!status.running) ? '' : 'none';
  if (save) save.style.display = isOnline ? '' : 'none';
}

async function confirmSaveWorld(game) {
  var labelEl = document.getElementById('saveWorldLabel');
  var wrapEl  = document.getElementById('saveWorldWrapper');
  var label = (labelEl && labelEl.value || '').trim();
  var wrapper = wrapEl && wrapEl.value || null;
  var modal = document.getElementById('saveWorldModal');
  if (modal) modal.remove();
  toast('Saving world…', true);
  try {
    var r = await fetch('/servers/api/backups/local/' + game, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label: label || null, wrapper: wrapper || null }),
    });
    var d = await r.json();
    if (d.ok) {
      toast('World saved' + (label ? ' as "' + label + '"' : ''), true);
      loadWorldSaves(game);
    } else {
      toast(d.message || d.error || 'Save failed', false);
    }
  } catch (e) {
    toast('Save failed', false);
  }
}

async function requestServer(game) {
  var btn = event.target;
  btn.disabled = true;
  btn.textContent = 'REQUESTING...';
  var worldSaveId = worldPick[game] || null;
  try {
    var r = await fetch('/servers/api/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game, worldSaveId }),
    });
    var d = await r.json();
    if (d.ok) {
      if (d.status === 'queued') {
        // Both local slots are taken; the free-tier user lands in the queue.
        // server-manager fires `server:queue-ready` over Socket.IO when a slot
        // frees and their game starts up.
        btn.classList.add('sent');
        btn.textContent = 'QUEUED · #' + (d.position || '?');
        showQueueModal(game, d);
      } else {
        toast(d.message, true);
        btn.classList.add('sent');
        if (d.status === 'provisioning') {
          btn.textContent = 'PROVISIONING...';
          startProvisionPoller(game, btn);
        } else {
          btn.textContent = 'BOOTING...';
        }
      }
      setTimeout(pollAllGames, 5000);
    } else {
      toast(d.error, false);
      btn.textContent = 'REQUEST SERVER';
      btn.disabled = false;
    }
  } catch (e) {
    toast('Request failed', false);
    btn.textContent = 'REQUEST SERVER';
    btn.disabled = false;
  }
}

      '</div>' +
    '</div>';

}

// ── Provision Poller ──
var provisionPollers = {};
function startProvisionPoller(game, btn) {
  if (provisionPollers[game]) return;
  var attempts = 0;
  provisionPollers[game] = setInterval(async function() {
    attempts++;
    try {
      var r = await fetch('/servers/api/provisioned-status/' + game);
      var d = await r.json();
      if (!d.active) {
        btn.textContent = 'START SERVER'; btn.disabled = false; btn.classList.remove('sent');
        clearInterval(provisionPollers[game]); delete provisionPollers[game]; return;
      }
      if (d.ready && d.connect) {
        clearInterval(provisionPollers[game]); delete provisionPollers[game];
        toast(game.toUpperCase() + ' server LIVE at ' + d.connect, true);
        btn.style.display = 'none';
        var joinBtn = document.createElement('a');
        joinBtn.href = '#'; joinBtn.className = 'btn-join'; joinBtn.textContent = 'JOIN SERVER';
        joinBtn.dataset.connect = d.connect; joinBtn.dataset.steam = d.steam; joinBtn.dataset.gameid = game;
        joinBtn.onclick = function() { return joinServer(joinBtn); };
        btn.parentElement.appendChild(joinBtn);
        return;
      }
      btn.textContent = d.ip ? 'INSTALLING' + '.'.repeat((attempts%3)+1) : 'PROVISIONING' + '.'.repeat((attempts%3)+1);
    } catch (e) {}
    if (attempts >= 60) {
      btn.textContent = 'TIMEOUT'; clearInterval(provisionPollers[game]); delete provisionPollers[game];
    }
  }, 10000);
}

// ── Leaderboard ──
async function sortLb(gameId, field, btn) {
  if (btn) {
    btn.parentElement.querySelectorAll('.lb-sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const data = await api('GET', `/stats/leaderboard/${gameId}?sort=${field}&limit=10`);
  const container = document.getElementById(gameId + '_lb');
  if (!data || !data.players || !data.players.length) {
    container.innerHTML = '<div class="lb-empty">No players yet</div>';
    return;
  }
  const rankClass = ['gold','silver','bronze'];
  container.innerHTML = data.players.map((p, i) => `
    <div class="lb-row">
      <span class="lb-rank ${rankClass[i]||''}">#${i+1}</span>
      <span class="lb-name">${esc(p.name || p.steamId || '?')}</span>
      <span class="lb-stat highlight">${formatStat(field, p[field])}</span>
      <span class="lb-stat">${p.kills||0}K</span>
      <span class="lb-stat">${p.deaths||0}D</span>
    </div>
  `).join('');
}

function formatStat(field, val) {
  if (field === 'totalPlaytime' && val) {
    var hrs = Math.floor(val / 3600);
    var mins = Math.floor((val % 3600) / 60);
    return hrs > 0 ? hrs + 'h ' + mins + 'm' : mins + 'm';
  }
  return val || 0;
}

// ── Notable Events ──
async function loadNotable(gameId) {
  const data = await api('GET', `/stats/notable/${gameId}?limit=15`);
  const container = document.getElementById(gameId + '_notable');
  if (!data || !data.events || !data.events.length) {
    container.innerHTML = '<div class="lb-empty">No events yet</div>';
    return;
  }
  const icons = { death: '\u{1F480}', boss_kill: '\u{1F451}', kill: '\u{2694}', raid_start: '\u{26A1}', raid_end: '\u{1F6E1}',
                  npc_kill: '\u{1F480}', mob_kill: '\u{1F5E1}', ship_sunk: '\u{26F5}', item_drop: '\u{1F4E6}' };
  const grouped = consolidateFeedEvents(data.events);
  container.innerHTML = grouped.map(ev => {
    const time = new Date(ev.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const countSuffix = ev._count > 1 ? ` <span class="event-count">×${ev._count}</span>` : '';
    let text = '';
    if (ev.type === 'death') {
      text = `<span class="name">${esc(ev.victim||'?')}</span> killed by <span class="name">${esc(ev.attacker||'?')}</span>`;
    } else if (ev.type === 'boss_kill') {
      text = `<span class="name">${esc(ev.killedBy||prettyActorClass(ev.boss)||'?')}</span> slew <span class="name">${esc(ev.boss||'?')}</span>`;
    } else if (ev.type === 'kill') {
      text = `<span class="name">${esc(ev.attacker||'?')}</span> killed <span class="name">${esc(ev.victim||'?')}</span>`;
    } else if (ev.type === 'raid_start') {
      text = `Raid: <span class="name">${esc(ev.raidEvent||ev.name||'?')}</span>`;
    } else if (ev.type === 'raid_end') {
      text = 'Raid ended' + countSuffix;
    } else if (ev.type === 'npc_kill' || ev.type === 'mob_kill') {
      text = `<span class="name">${esc(prettyActorClass(ev.actorClass) || ev.victim || '?')}</span> defeated` + countSuffix;
    } else if (ev.type === 'ship_sunk') {
      text = `Sunk <span class="name">${esc(prettyActorClass(ev.actorClass) || ev.victim || '?')}</span>` + countSuffix;
    } else if (ev.type === 'item_drop') {
      text = `Dropped <span class="name">${esc(prettyActorClass(ev.actorClass) || ev.item || '?')}</span>` + countSuffix;
    }
    return `<div class="notable-item"><span class="notable-time">${time}</span><span class="notable-icon">${icons[ev.type]||'\u{2022}'}</span><span class="notable-text">${text}</span></div>`;
  }).join('');
}

    });

// ── Helpers ──
async function api(method, url, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    if (r.status === 401) { location.href = '/login'; return null; }
    return r.json();
  } catch { return null; }
}

function toast(msg, ok = true, hold = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (ok ? ' ok' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; el.onclick = null; el.style.cursor = ''; }, hold);
}

// Suppress repeat player_join toasts for the same (game, player) within 10s —
// reconnect storms (laggy clients, server hiccups) re-fire join events and the
// toast otherwise becomes background noise.
const _joinSeen = new Map();
function maybeToastPlayerJoin(ev) {
  const key = ev.game + ':' + (ev.steamId || ev.name || '');
  const now = Date.now();
  const last = _joinSeen.get(key) || 0;
  if (now - last < 10000) return;
  _joinSeen.set(key, now);
  if (_joinSeen.size > 200) {
    for (const [k, t] of _joinSeen) { if (now - t > 60000) _joinSeen.delete(k); }
  }
  const who = ev.name || 'A player';
  toast(who + ' joined ' + ev.game.toUpperCase(), true);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Reuse the modbuilder's class label cleaner so windrose combat events read as
// "BlackBeard Regular Sailor" rather than "BP_Mob_BlackBeard_Regular_Sailor_C".
function prettyActorClass(c) {
  if (!c) return '';
  return String(c).replace(/^BP_(Boss|Mob|NPC|AIShip|Carrying|Sc_)/i, '').replace(/_C$/, '').replace(/_/g, ' ').trim();
}
const GAME_CSS = { rust: 'rust', valheim: 'valheim', l4d2: 'l4d2', '7dtd': 'sdtd', se: 'se', palworld: 'palworld', windrose: 'windrose' };

let feedEvents = [];
let feedCap = 100;
let feedHasMore = true;
let feedLoadingOlder = false;
const FEED_PAGE_SIZE = 30;

async function loadRecentEvents() {
  const data = await api('GET', '/stats/events?limit=' + FEED_PAGE_SIZE);
  if (!data || !data.events) return;
  feedEvents = data.events.reverse();
  feedHasMore = data.events.length === FEED_PAGE_SIZE;
  renderFeed();
}

async function loadOlderEvents() {
  if (feedLoadingOlder || !feedHasMore || !feedEvents.length) return;
  feedLoadingOlder = true;
  const btn = document.getElementById('feedLoadOlder');
  if (btn) { btn.disabled = true; btn.textContent = 'Loading older events…'; }

  // Preserve scroll position so the row the user was reading stays put
  // after we prepend the older events.
  const list = document.getElementById('eventList');
  const prevHeight = list.scrollHeight;
  const prevTop = list.scrollTop;

  try {
    const oldest = feedEvents[0].ts;
    const url = '/stats/events?limit=' + FEED_PAGE_SIZE + '&before=' + encodeURIComponent(oldest);
    const data = await api('GET', url);
    const older = (data && data.events) ? data.events.reverse() : [];
    if (older.length < FEED_PAGE_SIZE) feedHasMore = false;
    if (older.length) {
      feedEvents = older.concat(feedEvents);
      feedCap = Math.max(feedCap, feedEvents.length + FEED_PAGE_SIZE);
      renderFeed({ preserveScroll: true, prevHeight, prevTop });
    } else {
      renderFeed({ preserveScroll: true, prevHeight, prevTop });
    }
  } catch {
    if (btn) { btn.disabled = false; btn.textContent = 'Load older events'; }
  } finally {
    feedLoadingOlder = false;
  }
}
