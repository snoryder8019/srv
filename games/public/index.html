<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MadLadsLab Game Servers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 40px 20px; }
    h1 { color: #cd412b; font-size: 2rem; margin-bottom: 8px; }
    p.sub { color: #888; margin-bottom: 40px; }
    .server-card {
      background: #1a1a1a; border: 1px solid #333; border-left: 4px solid #cd412b;
      border-radius: 4px; padding: 24px; max-width: 600px; margin-bottom: 20px;
    }
    .server-card h2 { color: #fff; font-size: 1.1rem; margin-bottom: 12px; }
    .info { display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; }
    .info span { color: #888; }
    .info code { color: #4caf82; background: #111; padding: 2px 6px; border-radius: 3px; }
    .badge {
      display: inline-block; font-size: 0.75rem; padding: 2px 8px;
      border-radius: 12px; margin-bottom: 12px;
      background: #2a2a2a; border: 1px solid #cd412b; color: #cd412b;
    }
  </style>
</head>
<body>
  <h1>MadLadsLab Game Servers</h1>
  <p class="sub">games.madladslab.com</p>

  <div class="server-card">
    <span class="badge">RUST</span>
    <h2>MadLadsLab Rust</h2>
    <div class="info">
      <div><span>Connect:</span> <code>client.connect games.madladslab.com:28015</code></div>
      <div><span>Max Players:</span> <code>100</code></div>
      <div><span>World Size:</span> <code>3500</code></div>
      <div><span>Mods:</span> <code>Oxide / uMod</code></div>
    </div>
  </div>
</body>
</html>
