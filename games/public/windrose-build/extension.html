<!--
  Windrose Admin Build overlay.
  boot() in extension.js populates all the data cells below.
  Prefix: .wrbe- / wrbe_
-->
<div class="wrbe-admin">

  <div class="wrbe-section">
    <div class="wrbe-section-hdr">Server</div>
    <div id="wrbe_status" class="wrbe-status-row">
      <span class="wrbe-muted">Connecting&hellip;</span>
    </div>
  </div>

  <div class="wrbe-section">
    <div class="wrbe-section-hdr">
      Players
      <span id="wrbe_player_count" class="wrbe-count"></span>
      <span id="wrbe_poll_age" class="wrbe-age"></span>
    </div>
    <div id="wrbe_players" class="wrbe-list">
      <span class="wrbe-muted">Loading&hellip;</span>
    </div>
  </div>

  <div class="wrbe-section">
    <div class="wrbe-section-hdr">Recent Events</div>
    <div id="wrbe_events" class="wrbe-events">
      <span class="wrbe-muted">Loading&hellip;</span>
    </div>
  </div>

  <div class="wrbe-section">
    <div class="wrbe-section-hdr">Mods</div>
    <div id="wrbe_mods" class="wrbe-list">
      <span class="wrbe-muted">Loading&hellip;</span>
    </div>
  </div>

</div>
