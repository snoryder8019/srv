<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter — MadLadsLab Games</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--surface:#111;--card:#151515;--border:#222;
        --accent:#cd412b;--accent-glow:rgba(205,65,43,0.4);
        --green:#4caf82;--yellow:#e6b800;--text:#e8e8e8;--muted:#666}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  nav{position:sticky;top:0;background:rgba(10,10,10,0.9);backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(205,65,43,0.15);padding:14px 24px;
      display:flex;justify-content:space-between;align-items:center;z-index:10}
  .brand{color:var(--accent);font-weight:bold;letter-spacing:0.1em}
  .brand-sub{color:var(--muted);font-size:0.6rem;margin-left:6px}
  .nav-actions{display:flex;gap:8px}
  .nav-btn{font-family:inherit;font-size:0.68rem;font-weight:bold;
           border:1px solid var(--border);padding:6px 12px;border-radius:3px;
           color:var(--muted);background:transparent;letter-spacing:0.05em}
  .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-btn.accent{border-color:var(--accent);color:var(--accent)}
  .nav-btn.accent:hover{background:var(--accent);color:#fff}

  .wrap{max-width:760px;margin:32px auto 60px;padding:0 20px}
  .page-head{margin-bottom:28px}
  .page-tag{font-size:0.55rem;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;
            border:1px solid rgba(205,65,43,0.3);padding:4px 12px;border-radius:2px;display:inline-block;margin-bottom:14px}
  .page-title{font-size:1.9rem;letter-spacing:0.06em;color:#fff;margin-bottom:8px}
  .page-desc{color:var(--muted);font-size:0.82rem;max-width:520px}

  .sub-card{margin:18px 0 32px;background:var(--card);border:1px solid var(--border);border-radius:8px;
            padding:16px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .sub-card .label{font-size:0.65rem;color:var(--accent);letter-spacing:0.14em;text-transform:uppercase;font-weight:bold;flex-basis:100%}
  .sub-card input[type=email]{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);
              border-radius:3px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:0.8rem}
  .sub-btn{background:var(--accent);color:#fff;border:none;border-radius:3px;
           font-family:inherit;font-weight:bold;font-size:0.72rem;letter-spacing:0.1em;
           padding:9px 18px;cursor:pointer;transition:all 0.2s}
  .sub-btn:hover{background:#e04530}
  .sub-msg{font-size:0.72rem;color:var(--muted);flex-basis:100%;min-height:1.1em}
  .sub-msg.ok{color:var(--green)}.sub-msg.err{color:var(--accent)}

  .thread{background:var(--card);border:1px solid var(--border);border-radius:8px;
          margin-bottom:22px;overflow:hidden}
  .thread.kind-update{border-left:3px solid #4a7c9e}
  .thread.kind-help{border-left:3px solid var(--yellow)}
  .thread.kind-maintenance{border-left:3px solid var(--accent)}
  .thread.kind-event{border-left:3px solid #9c27b0}
  .thread.kind-news{border-left:3px solid var(--green)}
  .thread-thumb{width:100%;display:block;max-height:280px;object-fit:cover;background:#000}
  .thread-body{padding:18px 22px}
  .thread-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:0.58rem;
               letter-spacing:0.12em;text-transform:uppercase;font-weight:bold}
  .kind-pill{padding:2px 8px;border-radius:2px}
  .kind-pill.news{background:rgba(76,175,130,0.15);color:var(--green)}
  .kind-pill.update{background:rgba(74,124,158,0.15);color:#4a7c9e}
  .kind-pill.help{background:rgba(230,184,0,0.15);color:var(--yellow)}
  .kind-pill.maintenance{background:rgba(205,65,43,0.15);color:var(--accent)}
  .kind-pill.event{background:rgba(156,39,176,0.15);color:#ce93d8}
  .kind-pill.note{background:#222;color:var(--muted)}
  .thread-date{color:var(--muted);margin-left:auto;font-size:0.56rem}
  .thread-subject{font-size:1.15rem;margin-bottom:8px;color:#fff;letter-spacing:0.02em}
  .thread-text{font-size:0.86rem;color:var(--text);line-height:1.6;white-space:pre-wrap}
  .thread-text a{text-decoration:underline}
  .replies{border-top:1px solid var(--border);padding:14px 22px;background:rgba(0,0,0,0.2)}
  .reply{padding:10px 0;border-bottom:1px solid rgba(42,42,42,0.4)}
  .reply:last-child{border-bottom:none}
  .reply-head{font-size:0.55rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
  .reply-text{font-size:0.78rem;color:var(--text);line-height:1.55;white-space:pre-wrap}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:0.85rem;font-style:italic}
</style>
</head>
<body>

<nav>
  <div><span class="brand">MADLADSLAB</span><span class="brand-sub">NEWSLETTER</span></div>
  <div class="nav-actions">
    <a href="/" class="nav-btn">HOME</a>
    <a href="/login" class="nav-btn accent" id="navAuth">LOGIN</a>
  </div>
</nav>

<div class="wrap">
  <div class="page-head">
    <div class="page-tag">DISPATCH</div>
    <h1 class="page-title">News &amp; Updates</h1>
    <p class="page-desc">Patch notes, server wipes, event windows, and the occasional rant. Subscribe to get them by email.</p>
  </div>

  <div class="sub-card">
    <div class="label">Subscribe</div>
    <input type="email" id="subEmail" placeholder="you@example.com" autocomplete="email">
    <button class="sub-btn" id="subBtn" type="button">JOIN</button>
    <div class="sub-msg" id="subMsg"></div>
  </div>

  <div id="threadList">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
(function() {
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  // Defensive: never render anything that looks like an email address as an
  // author — old records may still carry email-as-author from before we
  // standardized on the public username helper. Show the local-part only,
  // or fall back to "admin".
  function safeAuthor(s) {
    if (!s) return 'admin';
    var t = String(s).trim();
    if (/@/.test(t)) return 'admin';
    return t;
  }
  function fmtDate(d) {
    if (!d) return '';
    var x = new Date(d);
    return x.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Authed users see a one-click join (their email is auto-pulled server-side).
  // Guests get the email input. Auth is detected through /broadcasts/api/me
  // which is already used elsewhere — keeps the page hitting the same endpoint
  // the rest of the app does.
  var authed = false;
  fetch('/broadcasts/api/me').then(function(r){return r.json()}).then(function(me){
    if (me && me.authed) {
      authed = true;
      document.getElementById('navAuth').textContent = 'DASHBOARD';
      document.getElementById('navAuth').href = '/dashboard';
      // Never display the email on the page — server pulls it from session
      // on POST. Show the screenname so the user knows which account they're
      // subscribing.
      var inp = document.getElementById('subEmail');
      inp.style.display = 'none';
      var btn = document.getElementById('subBtn');
      btn.textContent = 'JOIN AS ' + (me.username || 'YOU').toUpperCase();
      var msg = document.getElementById('subMsg');
      msg.textContent = 'Subscribing as ' + (me.username || 'this account') + '.';
    }
  }).catch(function(){});

  document.getElementById('subBtn').addEventListener('click', function() {
    var btn = this;
    var msg = document.getElementById('subMsg');
    var email = document.getElementById('subEmail').value.trim();
    msg.textContent = ''; msg.className = 'sub-msg';
    btn.disabled = true; btn.textContent = '…';
    fetch('/newsletter/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: authed ? undefined : email, source: 'newsletter-page' }),
    }).then(function(r){return r.json().then(function(d){d.__status=r.status;return d})})
      .then(function(d){
        if (d.error) { msg.textContent = d.error; msg.classList.add('err'); }
        else if (d.status === 'subscribed' || d.status === 'resubscribed') {
          msg.textContent = 'Subscribed — thanks!'; msg.classList.add('ok');
        } else if (d.status === 'already_subscribed') {
          msg.textContent = 'Already on the list.'; msg.classList.add('ok');
        } else { msg.textContent = 'Done.'; msg.classList.add('ok'); }
      })
      .catch(function(e){ msg.textContent = 'Network error — retry.'; msg.classList.add('err'); })
      .finally(function(){ btn.disabled = false; btn.textContent = 'JOIN'; });
  });

  function renderThread(t) {
    var date = fmtDate(t.publishedAt || t.createdAt);
    var thumb = t.thumbnailUrl
      ? '<img class="thread-thumb" src="' + esc(t.thumbnailUrl) + '" alt="">'
      : '';
    var replies = (t.replies || []).map(function(r) {
      return '<div class="reply">'
        + '<div class="reply-head">' + esc(safeAuthor(r.author)) + ' &middot; ' + fmtDate(r.publishedAt || r.createdAt) + '</div>'
        + '<div class="reply-text">' + esc(r.body) + '</div>'
        + '</div>';
    }).join('');
    var repliesBlock = replies ? '<div class="replies">' + replies + '</div>' : '';
    return '<div class="thread kind-' + esc(t.kind || 'news') + '">'
      + thumb
      + '<div class="thread-body">'
        + '<div class="thread-head">'
          + '<span class="kind-pill ' + esc(t.kind || 'news') + '">' + esc(t.kind || 'news') + '</span>'
          + '<span class="thread-date">' + date + '</span>'
        + '</div>'
        + '<div class="thread-subject">' + esc(t.subject || '') + '</div>'
        + '<div class="thread-text">' + esc(t.body || '') + '</div>'
      + '</div>'
      + repliesBlock
    + '</div>';
  }

  function loadThreads() {
    fetch('/newsletter/api/list').then(function(r){return r.json()}).then(function(d){
      var list = document.getElementById('threadList');
      if (!d.threads || !d.threads.length) {
        list.innerHTML = '<div class="empty">No newsletters yet — the first one ships when something is worth saying.</div>';
        return;
      }
      list.innerHTML = d.threads.map(renderThread).join('');
    }).catch(function(){
      document.getElementById('threadList').innerHTML = '<div class="empty">Could not load newsletters.</div>';
    });
  }
  loadThreads();
})();
</script>
</body>
</html>
