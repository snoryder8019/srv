<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>On the Fly — Colorado Trout Conditions</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #8b949e;
    --accent: #58a6ff;
    --good: #3fb950;
    --warn: #d29922;
    --bad: #f85149;
    --mono: ui-monospace, SFMono-Regular, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, sans-serif;
  }
  header {
    max-width: 1200px; margin: 0 auto 28px;
    display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px;
  }
  h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .updated { color: var(--dim); font-size: 13px; font-family: var(--mono); }
  main { max-width: 1200px; margin: 0 auto; display: grid; gap: 24px; }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
  }
  .panel h2 { margin: 0 0 16px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
  .panel h2::before { content: ""; display: inline-block; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  td.cfs, td.temp { font-family: var(--mono); }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-family: var(--mono); }
  .pill.good { background: rgba(63,185,80,0.15); color: var(--good); }
  .pill.warn { background: rgba(210,153,34,0.15); color: var(--warn); }
  .pill.bad { background: rgba(248,81,73,0.15); color: var(--bad); }
  .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .wx { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .wx h3 { margin: 0 0 8px; font-size: 14px; }
  .wx p { margin: 4px 0; color: var(--dim); font-size: 13px; }
  .wx p strong { color: var(--text); }
  .hatch { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
  .hatch ul { margin: 6px 0 0; padding-left: 20px; }
  .hatch li { margin: 3px 0; }
  .hatch h3 { margin: 0 0 6px; font-size: 14px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .notes { color: var(--dim); font-size: 13px; font-style: italic; margin-top: 10px; }
  footer { max-width: 1200px; margin: 32px auto 0; text-align: center; color: var(--dim); font-size: 12px; font-family: var(--mono); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (max-width: 600px) {
    .hatch { grid-template-columns: 1fr; }
    body { padding: 14px; }
  }
</style>
</head>
<body>
<header>
  <h1>on the <span>fly</span></h1>
  <div class="updated" id="updated">loading…</div>
</header>

<main>
  <section class="panel">
    <h2>This Month's Hatch</h2>
    <div id="hatch"></div>
  </section>

  <section class="panel">
    <h2>Live Flows &amp; Water Temps</h2>
    <table id="flows-table">
      <thead><tr><th>River</th><th>Reach</th><th>CFS</th><th>Water °F</th><th>Status</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="notes">Source: USGS Water Services. Auto-refreshes every 15 min.</div>
  </section>

  <section class="panel">
    <h2>Forecast</h2>
    <div id="weather" class="grid"></div>
    <div class="notes">Source: NOAA / National Weather Service. Refreshes hourly.</div>
  </section>
</main>

<footer>
  on-the-fly · <a href="/api/all">json api</a> · usgs + noaa + a small amount of trout obsession
</footer>

<script>
function flowStatus(cfs) {
  if (cfs == null || isNaN(cfs)) return ['—', ''];
  if (cfs < 50) return ['low', 'warn'];
  if (cfs < 400) return ['fishable', 'good'];
  if (cfs < 1000) return ['high', 'warn'];
  return ['blown out', 'bad'];
}

async function load() {
  try {
    const r = await fetch('/api/all');
    const d = await r.json();

    document.getElementById('updated').textContent = 'updated ' + new Date(d.generated).toLocaleString();

    // Hatch
    const h = d.hatches_now;
    if (h) {
      document.getElementById('hatch').innerHTML = `
        <h3 style="margin:0 0 12px;font-size:16px;color:var(--text)">${h.name}</h3>
        <div class="hatch">
          <div>
            <h3>Primary</h3>
            <ul>${(h.primary || []).map((x) => `<li>${x}</li>`).join('')}</ul>
          </div>
          <div>
            <h3>Secondary</h3>
            <ul>${(h.secondary || []).map((x) => `<li>${x}</li>`).join('')}</ul>
          </div>
        </div>
        <p class="notes">${h.notes || ''}</p>`;
    }

    // Flows
    const tbody = document.querySelector('#flows-table tbody');
    tbody.innerHTML = (d.flows.data || []).map((f) => {
      const [label, cls] = flowStatus(f.cfs);
      return `<tr>
        <td>${f.river || ''}</td>
        <td>${f.reach || ''}</td>
        <td class="cfs">${f.cfs != null ? f.cfs.toFixed(0) : '—'}</td>
        <td class="temp">${f.temp_f != null ? f.temp_f.toFixed(1) : '—'}</td>
        <td><span class="pill ${cls}">${label}</span></td>
      </tr>`;
    }).join('');

    // Weather
    document.getElementById('weather').innerHTML = (d.weather.data || []).map((w) => {
      const today = w.periods?.[0];
      const tonight = w.periods?.[1];
      if (!today) return `<div class="wx"><h3>${w.label}</h3><p>no data</p></div>`;
      return `<div class="wx">
        <h3>${w.label}</h3>
        <p><strong>${today.name}:</strong> ${today.temperature}°${today.temperatureUnit}, ${today.shortForecast}</p>
        <p>Wind: ${today.windSpeed} ${today.windDirection}</p>
        ${tonight ? `<p style="margin-top:6px;font-size:12px;">${tonight.name}: ${tonight.temperature}°, ${tonight.shortForecast}</p>` : ''}
      </div>`;
    }).join('');
  } catch (err) {
    document.getElementById('updated').textContent = 'error: ' + err.message;
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
