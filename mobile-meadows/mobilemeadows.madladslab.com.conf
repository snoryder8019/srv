<VirtualHost *:80>
    ServerName mobilemeadows.madladslab.com

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3700/
    ProxyPassReverse / http://127.0.0.1:3700/

    # WebSocket support for Socket.IO
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3700/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/mobilemeadows-error.log
    CustomLog ${APACHE_LOG_DIR}/mobilemeadows-access.log combined
</VirtualHost>
